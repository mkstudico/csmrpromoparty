<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galagram • Requests</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayRemove, addDoc, collection, writeBatch } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA3gohTf1rzOYBBQCI-WD8ORoTK4DOf-fw",
            authDomain: "akademia-c56ff.firebaseapp.com",
            databaseURL: "https://akademia-c56ff-default-rtdb.firebaseio.com",
            projectId: "akademia-c56ff",
            storageBucket: "akademia-c56ff.firebasestorage.app",
            messagingSenderId: "678278775270",
            appId: "1:678278775270:web:ed5aee3d358d613c8cd627",
            measurementId: "G-X3CHCJE5LK"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .pc-blocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .app-container { display: block; max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; }
        .header { background: #ffffff; padding: 12px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 0.5px solid #efefef; position: sticky; top: 0; z-index: 10; }
        .back-btn { font-size: 1.6rem; cursor: pointer; color: #262626; }
        .logo { font-weight: 620; font-size: 1.3rem; background: linear-gradient(135deg, #f77737, #d62976, #962fbf); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .content { padding: 16px; background: #fafafa; min-height: 85vh; }
        .request-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1.5px solid #dbdbdb; }
        .user-info { flex: 1; }
        .user-name { font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 4px; }
        .user-username { font-size: 0.7rem; color: #8e8e8e; }
        .btn-group { display: flex; gap: 8px; }
        .btn-accept, .btn-reject { padding: 6px 16px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; border: none; cursor: pointer; }
        .btn-accept { background: #0095f6; color: white; }
        .btn-reject { background: #efefef; color: #ed4956; }
        .empty-state { text-align: center; padding: 40px; color: #8e8e8e; }
        .galagram-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); color: white; padding: 12px 20px; border-radius: 40px; z-index: 10000; transition: transform 0.25s; pointer-events: none; }
        .galagram-toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: #8e8e8e; }
        .bx-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .verified-badge { font-size: 0.8rem; }
        .verified-badge.blue { color: #0095f6; }
        .verified-badge.gray { color: #8e8e8e; }
    </style>
</head>
<body>

<div id="pcBlocker" class="pc-blocker"><i class='bx bx-mobile-alt'></i><p>Use your phone — PC is not supported</p></div>

<div id="appRoot" class="app-container">
    <div class="header">
        <i class='bx bx-arrow-back back-btn' id="backBtn"></i>
        <div class="logo">Requests</div>
    </div>
    <div class="content" id="requestsContent">
        <div class="loading"><i class='bx bx-loader-alt bx-spin'></i> Loading requests...</div>
    </div>
</div>

<script type="module">
    import { getFirestore, doc, getDoc, updateDoc, arrayRemove, addDoc, collection, writeBatch } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const db = window.db;
    
    // Logging function (same as in home.html)
    async function addLog(type, actor, target, message) {
        try {
            await addDoc(collection(db, "logs"), {
                type: type,
                actor: actor,
                target: target || null,
                message: message,
                timestamp: new Date()
            });
        } catch(e) { console.warn("Log error:", e); }
    }
    
    function showNotification(message, type = "success") {
        const existing = document.querySelector('.galagram-toast');
        if(existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = `galagram-toast`;
        toast.innerHTML = `<i class='bx ${type === 'error' ? 'bx-error-circle' : 'bx-check-circle'}'></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => toast.remove(), 3000);
    }
    
    const sessionData = localStorage.getItem('galagram_session');
    if (!sessionData) { window.location.href = "index.html"; }
    const session = JSON.parse(sessionData);
    const currentUsername = session.username;
    
    let currentUserData = null;
    
    async function loadCurrentUser() {
        const userDoc = await getDoc(doc(db, "users", currentUsername));
        if (userDoc.exists()) {
            currentUserData = userDoc.data();
        } else {
            window.location.href = "index.html";
        }
    }
    
    async function loadRequests() {
        const userDoc = await getDoc(doc(db, "users", currentUsername));
        if (!userDoc.exists()) return;
        const requests = userDoc.data().requests || [];
        
        if (requests.length === 0) {
            document.getElementById('requestsContent').innerHTML = `<div class="empty-state"><i class='bx bx-heart' style="font-size: 3rem;"></i><p>No pending requests</p><p style="font-size:0.75rem; margin-top:8px;">When someone requests to pair with you, they'll appear here</p></div>`;
            return;
        }
        
        let html = '';
        for (const requesterId of requests) {
            const requesterDoc = await getDoc(doc(db, "users", requesterId));
            if (requesterDoc.exists()) {
                const user = requesterDoc.data();
                const verifiedIcon = user.verified === 'blue' ? '<i class="bx bx-check-circle verified-badge blue"></i>' : (user.verified === 'gray' ? '<i class="bx bxs-check-circle verified-badge gray"></i>' : '');
                html += `
                    <div class="request-card" data-id="${requesterId}">
                        <img class="user-avatar" src="${user.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt="">
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(user.realName)} ${verifiedIcon}</div>
                            <div class="user-username">@${user.username}</div>
                        </div>
                        <div class="btn-group">
                            <button class="btn-accept" data-id="${requesterId}" data-name="${user.realName}">Accept</button>
                            <button class="btn-reject" data-id="${requesterId}">Reject</button>
                        </div>
                    </div>
                `;
            }
        }
        document.getElementById('requestsContent').innerHTML = html;
        
        // Accept button handler (with auto-reject of others)
        document.querySelectorAll('.btn-accept').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const requesterId = btn.dataset.id;
                const requesterName = btn.dataset.name;
                
                // Get current user's requests list again to ensure we have all
                const currentUserDoc = await getDoc(doc(db, "users", currentUsername));
                const allRequests = currentUserDoc.data().requests || [];
                const otherRequests = allRequests.filter(id => id !== requesterId);
                
                // Use batch to ensure atomicity
                const batch = writeBatch(db);
                
                // Accept the chosen one
                batch.update(doc(db, "users", currentUsername), {
                    galaStatus: "taken",
                    pairedWith: requesterId,
                    requests: arrayRemove(requesterId)
                });
                batch.update(doc(db, "users", requesterId), {
                    galaStatus: "taken",
                    pairedWith: currentUsername,
                    sentRequests: arrayRemove(currentUsername)
                });
                
                // Reject all others
                for (const otherId of otherRequests) {
                    batch.update(doc(db, "users", otherId), {
                        sentRequests: arrayRemove(currentUsername)
                    });
                    // Add log for each auto-rejection
                    const otherUserDoc = await getDoc(doc(db, "users", otherId));
                    if (otherUserDoc.exists()) {
                        const otherName = otherUserDoc.data().realName;
                        await addLog('reject', currentUsername, otherId, `${currentUsername} automatically rejected ${otherName} (accepted ${requesterName})`);
                    }
                }
                
                // Clear remaining requests array
                batch.update(doc(db, "users", currentUsername), { requests: [] });
                
                await batch.commit();
                
                // Add success logs
                await addLog('accept', currentUsername, requesterId, `${currentUsername} accepted ${requesterName}`);
                await addLog('pair', currentUsername, requesterId, `${currentUsername} paired with ${requesterName}`);
                
                showNotification(`🎉 You are now paired with ${requesterName}! Others were automatically declined.`, 'success');
                setTimeout(() => window.location.href = "home.html", 1500);
            });
        });
        
        // Reject button handler
        document.querySelectorAll('.btn-reject').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const requesterId = btn.dataset.id;
                const requesterDoc = await getDoc(doc(db, "users", requesterId));
                const requesterName = requesterDoc.exists() ? requesterDoc.data().realName : requesterId;
                
                await updateDoc(doc(db, "users", currentUsername), {
                    requests: arrayRemove(requesterId)
                });
                await updateDoc(doc(db, "users", requesterId), {
                    sentRequests: arrayRemove(currentUsername)
                });
                
                await addLog('reject', currentUsername, requesterId, `${currentUsername} rejected ${requesterName}`);
                showNotification(`Request from ${requesterName} rejected`, 'success');
                loadRequests(); // refresh list
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('backBtn').addEventListener('click', () => { window.location.href = "home.html"; });
    
    // Screenshot protection
    (function antiScreenshot() {
        const blackFlash = () => {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = overlay.style.left = '0';
            overlay.style.width = overlay.style.height = '100%';
            overlay.style.backgroundColor = '#000000';
            overlay.style.zIndex = '999999';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 200);
        };
        document.addEventListener('keyup', (e) => { if(e.key === 'PrintScreen') { blackFlash(); e.preventDefault(); } });
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); blackFlash(); });
    })();
    
    function handleResize() {
        const blocker = document.getElementById('pcBlocker');
        const app = document.getElementById('appRoot');
        if(window.innerWidth > 768) { blocker.style.display = 'flex'; if(app) app.style.display = 'none'; }
        else { blocker.style.display = 'none'; if(app) app.style.display = 'block'; }
    }
    window.addEventListener('resize', handleResize);
    handleResize();
    
    (async () => {
        await loadCurrentUser();
        await loadRequests();
    })();
</script>
</body>
</html>
