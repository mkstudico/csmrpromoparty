<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galagram • My Profile</title>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Galagram">
<link rel="apple-touch-icon" href="icon-192.png">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, deleteDoc, addDoc, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA3gohTf1rzOYBBQCI-WD8ORoTK4DOf-fw",
            authDomain: "akademia-c56ff.firebaseapp.com",
            databaseURL: "https://akademia-c56ff-default-rtdb.firebaseio.com",
            projectId: "akademia-c56ff",
            storageBucket: "akademia-c56ff.firebasestorage.app",
            messagingSenderId: "678278775270",
            appId: "1:678278775270:web:ed5aee3d358d613c8cd627",
            measurementId: "G-X3CHCJE5LK"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .pc-blocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .app-container { display: block; max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; }
        .header { background: #ffffff; padding: 12px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 0.5px solid #efefef; position: sticky; top: 0; z-index: 10; }
        .back-btn { font-size: 1.6rem; cursor: pointer; color: #262626; }
        .logo { font-weight: 620; font-size: 1.3rem; background: linear-gradient(135deg, #f77737, #d62976, #962fbf); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .content { padding: 20px; background: #fafafa; min-height: 85vh; }
        .profile-header { text-align: center; margin-bottom: 24px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #d62976; margin-bottom: 12px; }
        .profile-name { font-size: 1.4rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 4px; flex-wrap: wrap; }
        .profile-username { font-size: 0.9rem; color: #8e8e8e; margin: 4px 0; }
        .verified-badge { font-size: 1.2rem; margin-left: 4px; }
        .verified-badge.blue { color: #0095f6; }
        .verified-badge.gray { color: #8e8e8e; }
        .status-indicator { display: inline-block; padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; margin: 12px 0; }
        .status-available { background: #e3f7e8; color: #1e7b3e; }
        .status-taken { background: #ffe6e6; color: #c0392b; }
        .info-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid #efefef; }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-weight: 600; color: #8e8e8e; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
        .info-value { color: #262626; font-size: 0.9rem; }
        .btn { padding: 12px; width: 100%; border-radius: 10px; font-size: 0.95rem; font-weight: 600; border: none; cursor: pointer; margin-top: 12px; transition: 0.15s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: #0095f6; color: white; }
        .btn-danger { background: #efefef; color: #ed4956; border: 1px solid #ed4956; }
        .btn-secondary { background: #efefef; color: #262626; }
        
        /* Posts section */
        .section-title { font-size: 1rem; font-weight: 600; margin: 16px 0 12px 0; display: flex; align-items: center; gap: 8px; }
        .post-card { background: white; border-radius: 12px; margin-bottom: 12px; padding: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .post-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .post-author { font-weight: 600; font-size: 0.85rem; }
        .post-time { font-size: 0.65rem; color: #8e8e8e; }
        .post-text { font-size: 0.85rem; margin: 8px 0; line-height: 1.4; }
        .post-image { width: 100%; border-radius: 12px; margin-top: 8px; max-height: 200px; object-fit: cover; }
        .post-stats { display: flex; gap: 16px; margin-top: 10px; color: #8e8e8e; font-size: 0.7rem; }
        .post-actions { display: flex; gap: 12px; margin-top: 10px; padding-top: 8px; border-top: 0.5px solid #efefef; }
        .post-action-btn { background: none; border: none; font-size: 0.75rem; font-weight: 600; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .post-action-btn.edit { color: #0095f6; }
        .post-action-btn.delete { color: #ed4956; }
        .empty-posts { text-align: center; padding: 30px; color: #8e8e8e; background: white; border-radius: 16px; }
        
        .galagram-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); color: white; padding: 12px 20px; border-radius: 40px; font-size: 0.85rem; z-index: 10000; display: flex; align-items: center; gap: 10px; transition: transform 0.25s; pointer-events: none; }
        .galagram-toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: #8e8e8e; }
        .bx-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="pcBlocker" class="pc-blocker"><i class='bx bx-mobile-alt'></i><p>Use your phone — PC is not supported</p></div>

<div id="appRoot" class="app-container">
    <div class="header">
        <i class='bx bx-arrow-back back-btn' id="backBtn"></i>
        <div class="logo">My Profile</div>
    </div>
    <div class="content" id="contentArea">
        <div class="loading"><i class='bx bx-loader-alt bx-spin'></i> Loading...</div>
    </div>
</div>

<script type="module">
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, deleteDoc, addDoc, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const db = window.db;
    
    // Logging function
    async function addLog(type, actor, target, message) {
        try {
            await addDoc(collection(db, "logs"), {
                type: type,
                actor: actor,
                target: target || null,
                message: message,
                timestamp: new Date()
            });
        } catch(e) { console.warn("Log error:", e); }
    }
    
    function showNotification(message, type = "success") {
        const existing = document.querySelector('.galagram-toast');
        if(existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = `galagram-toast`;
        toast.innerHTML = `<i class='bx ${type === 'error' ? 'bx-error-circle' : 'bx-check-circle'}'></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => toast.remove(), 3000);
    }
    
    const sessionData = localStorage.getItem('galagram_session');
    if (!sessionData) { window.location.href = "index.html"; }
    const session = JSON.parse(sessionData);
    const currentUsername = session.username;
    
    let currentUser = null;
    let userPosts = [];
    let unsubscribePosts = null;
    
    async function loadCurrentUser() {
        const userDoc = await getDoc(doc(db, "users", currentUsername));
        if (!userDoc.exists()) { window.location.href = "index.html"; return; }
        currentUser = { id: userDoc.id, ...userDoc.data() };
        if (!currentUser.galaStatus) currentUser.galaStatus = "available";
        renderProfile();
        loadUserPosts();
    }
    
    function getVerifiedIcon(verified) {
        if (verified === "blue") return '<i class="bx bx-check-circle verified-badge blue"></i>';
        if (verified === "gray") return '<i class="bx bxs-check-circle verified-badge gray"></i>';
        return '';
    }
    
    function renderProfile() {
        const container = document.getElementById('contentArea');
        const verifiedIcon = getVerifiedIcon(currentUser.verified);
        const statusClass = currentUser.galaStatus === 'available' ? 'status-available' : 'status-taken';
        const statusText = currentUser.galaStatus === 'available' ? '✨ Available for Gala' : '💔 Already Taken';
        
        container.innerHTML = `
            <div class="profile-header">
                <img class="profile-avatar" src="${currentUser.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=100'}" alt="">
                <div class="profile-name">${escapeHtml(currentUser.realName)} ${verifiedIcon}</div>
                <div class="profile-username">@${currentUser.username}</div>
                <div class="status-indicator ${statusClass}">${statusText}</div>
            </div>
            
            <div class="info-card">
                <div class="info-row">
                    <span class="info-label"><i class='bx bx-male-female'></i> Gender</span>
                    <span class="info-value">${currentUser.gender === 'BOY' ? '👦 Boy' : '👧 Girl'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class='bx bx-phone'></i> Phone</span>
                    <span class="info-value">${escapeHtml(currentUser.phoneNumber || 'Not set')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class='bx bx-instagram'></i> Instagram</span>
                    <span class="info-value">${escapeHtml(currentUser.instagramName || 'Not connected')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class='bx bx-key'></i> 6-digit Code</span>
                    <span class="info-value">${currentUser.sixDigitCode}</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class='bx bx-calendar'></i> Joined</span>
                    <span class="info-value">${new Date(currentUser.createdAt).toLocaleDateString()}</span>
                </div>
            </div>
            
            <button class="btn btn-primary" id="editProfileBtn"><i class='bx bx-edit-alt'></i> Edit Profile</button>
            <button class="btn btn-danger" id="logoutBtn"><i class='bx bx-log-out'></i> Log Out</button>
            
            <div class="section-title"><i class='bx bx-news'></i> My Posts</div>
            <div id="myPostsContainer"></div>
        `;
        
        document.getElementById('editProfileBtn').addEventListener('click', () => {
            window.location.href = "profile-edit.html";
        });
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await updateDoc(doc(db, "users", currentUsername), { activeSession: null, lastActive: null }).catch(() => {});
            localStorage.removeItem('galagram_session');
            showNotification("Logged out");
            setTimeout(() => { window.location.href = "index.html"; }, 1000);
        });
        
        renderUserPosts();
    }
    
    function loadUserPosts() {
        if (unsubscribePosts) unsubscribePosts();
        const postsRef = collection(db, "news");
        const q = query(postsRef, where("authorUsername", "==", currentUsername), orderBy("createdAt", "desc"));
        unsubscribePosts = onSnapshot(q, (snapshot) => {
            userPosts = [];
            snapshot.forEach(docSnap => {
                userPosts.push({ id: docSnap.id, ...docSnap.data() });
            });
            renderUserPosts();
        });
    }
    
    function renderUserPosts() {
        const container = document.getElementById('myPostsContainer');
        if (!container) return;
        
        if (!userPosts.length) {
            container.innerHTML = `<div class="empty-posts"><i class='bx bx-empty' style="font-size: 2rem;"></i><p>You haven't posted anything yet.</p><p style="font-size:0.7rem;">Tap + on the home screen to create your first post!</p></div>`;
            return;
        }
        
        container.innerHTML = userPosts.map(post => `
            <div class="post-card" data-postid="${post.id}">
                <div class="post-header">
                    <img class="post-avatar" src="${post.authorAvatar || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt="">
                    <div>
                        <div class="post-author">${escapeHtml(post.authorName)}</div>
                        <div class="post-time">${formatTime(post.createdAt)}</div>
                    </div>
                </div>
                <div class="post-text">${escapeHtml(post.text)}</div>
                ${post.imageUrl ? `<img class="post-image" src="${post.imageUrl}" alt="post image">` : ''}
                <div class="post-stats">
                    <span><i class='bx bx-heart'></i> ${post.likes?.length || 0}</span>
                    <span><i class='bx bx-comment'></i> ${post.comments?.length || 0}</span>
                </div>
                <div class="post-actions">
                    <button class="post-action-btn edit" data-id="${post.id}"><i class='bx bx-edit-alt'></i> Edit</button>
                    <button class="post-action-btn delete" data-id="${post.id}"><i class='bx bx-trash'></i> Delete</button>
                </div>
            </div>
        `).join('');
        
        // Edit handlers
        document.querySelectorAll('.post-action-btn.edit').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const postId = btn.dataset.id;
                const post = userPosts.find(p => p.id === postId);
                const newText = prompt("Edit your post:", post.text);
                if (newText && newText.trim() && newText.trim() !== post.text) {
                    await updateDoc(doc(db, "news", postId), { text: newText.trim() });
                    await addLog('edit_post', currentUsername, null, `${currentUsername} edited a post: "${post.text.substring(0,30)}..." → "${newText.substring(0,30)}..."`);
                    showNotification("Post updated!");
                }
            });
        });
        
        // Delete handlers
        document.querySelectorAll('.post-action-btn.delete').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const postId = btn.dataset.id;
                const post = userPosts.find(p => p.id === postId);
                if (confirm("Delete this post permanently?")) {
                    await deleteDoc(doc(db, "news", postId));
                    await addLog('delete_post', currentUsername, null, `${currentUsername} deleted a post: "${post.text.substring(0,50)}"`);
                    showNotification("Post deleted");
                }
            });
        });
    }
    
    function formatTime(timestamp) {
        if (!timestamp) return 'just now';
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        if (diff < 60) return `${diff}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('backBtn').addEventListener('click', () => {
        if (unsubscribePosts) unsubscribePosts();
        window.location.href = "home.html";
    });
    
    // Screenshot protection
    (function antiScreenshot() {
        const blackFlash = () => {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = overlay.style.left = '0';
            overlay.style.width = overlay.style.height = '100%';
            overlay.style.backgroundColor = '#000000';
            overlay.style.zIndex = '999999';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 200);
        };
        document.addEventListener('keyup', (e) => { if(e.key === 'PrintScreen') { blackFlash(); e.preventDefault(); } });
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); blackFlash(); });
    })();
    
    function handleResize() {
        const blocker = document.getElementById('pcBlocker');
        const app = document.getElementById('appRoot');
        if(window.innerWidth > 768) { blocker.style.display = 'flex'; if(app) app.style.display = 'none'; }
        else { blocker.style.display = 'none'; if(app) app.style.display = 'block'; }
    }
    window.addEventListener('resize', handleResize);
    handleResize();
    
    loadCurrentUser();
</script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.log('Service Worker registration failed', err));
    });
  }
</script>
</body>
</html>
