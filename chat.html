<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Galagram • Chat</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.9.0/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Header */
        .header {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            font-size: 1.6rem;
            cursor: pointer;
            color: #262626;
        }
        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #f77737, #d62976, #962fbf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid #dbdbdb;
            background: white;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-weight: 600;
            color: #8e8e8e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #0095f6;
            border-bottom-color: #0095f6;
        }
        /* Main chat layout (two columns) */
        .chat-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* Conversations sidebar (for private chat) */
        .conversations-panel {
            width: 320px;
            border-right: 1px solid #dbdbdb;
            background: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.2s;
        }
        .conversations-panel.hide-on-mobile {
            display: flex;
        }
        .conversation-item {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #efefef;
            transition: background 0.1s;
        }
        .conversation-item:hover {
            background: #f8f8f8;
        }
        .conversation-item.active {
            background: #eef7ff;
        }
        .conv-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .conv-details {
            flex: 1;
        }
        .conv-name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .conv-last-msg {
            font-size: 0.75rem;
            color: #8e8e8e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .new-conversation {
            padding: 12px 16px;
            border-bottom: 1px solid #dbdbdb;
            background: #fafafa;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .new-conversation input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .new-conversation button {
            background: #0095f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        /* Messages panel (right side) */
        .messages-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            overflow: hidden;
        }
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }
        .chat-header .cancel-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #ed4956;
            display: none;
        }
        .chat-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }
        .chat-header .block-btn {
            background: none;
            border: none;
            color: #ed4956;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            align-self: flex-start;
        }
        .message.own {
            align-self: flex-end;
        }
        .message-bubble {
            background: #efefef;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            word-wrap: break-word;
            position: relative;
        }
        .message.own .message-bubble {
            background: #0095f6;
            color: white;
        }
        .message-info {
            font-size: 0.7rem;
            color: #8e8e8e;
            margin-top: 4px;
            margin-left: 8px;
            display: flex;
            gap: 12px;
        }
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            font-size: 0.7rem;
        }
        .message-actions span {
            cursor: pointer;
            color: #8e8e8e;
        }
        .message-actions span:hover {
            color: #0095f6;
        }
        .reply-preview {
            font-size: 0.7rem;
            background: #e0e0e0;
            padding: 4px 8px;
            border-radius: 12px;
            margin-bottom: 4px;
            color: #555;
        }
        .message.own .reply-preview {
            background: #006bbf;
            color: #ddd;
        }
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid #dbdbdb;
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
        }
        .emoji-btn {
            font-size: 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        .message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #dbdbdb;
            border-radius: 24px;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
        }
        .send-btn {
            background: #0095f6;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        emoji-picker {
            position: absolute;
            bottom: 70px;
            right: 20px;
            z-index: 100;
            width: 320px;
            max-height: 400px;
            display: none;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8e8e8e;
        }
        @media (max-width: 768px) {
            .chat-layout {
                flex-direction: column;
            }
            .conversations-panel {
                width: 100%;
                max-height: 40%;
                border-right: none;
                border-bottom: 1px solid #dbdbdb;
            }
            .messages-panel {
                height: 60%;
            }
            .chat-header .cancel-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <i class='bx bx-arrow-back back-btn' id="backBtn"></i>
        <div class="logo">Galagram Chat</div>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="public">🌍 PUBLIC</div>
        <div class="tab" data-tab="private">💬 PRIVATE</div>
    </div>
    <div class="chat-layout" id="chatLayout">
        <!-- Private conversations sidebar -->
        <div id="conversationsPanel" class="conversations-panel" style="display: none;">
            <div class="new-conversation">
                <input type="text" id="newConvUsername" placeholder="Username to start chat...">
                <button id="startConvBtn">Start</button>
            </div>
            <div id="conversationsList"></div>
        </div>
        <!-- Messages panel -->
        <div id="messagesPanel" class="messages-panel">
            <div class="chat-header">
                <button id="cancelPrivateBtn" class="cancel-btn"><i class='bx bx-x'></i> Cancel</button>
                <h3 id="chatTitle">Select a chat</h3>
                <button id="blockBtn" class="block-btn" style="display: none;">Block</button>
            </div>
            <div id="messagesContainer" class="messages-container">
                <div class="empty-state">Select a conversation to start messaging</div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <button id="emojiBtn" class="emoji-btn"><i class='bx bx-smile'></i></button>
                <textarea id="messageInput" class="message-input" rows="1" placeholder="Type a message..."></textarea>
                <button id="sendBtn" class="send-btn"><i class='bx bx-send'></i></button>
            </div>
        </div>
    </div>
    <emoji-picker id="emojiPicker"></emoji-picker>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, onSnapshot, addDoc, orderBy, deleteDoc, serverTimestamp, arrayUnion, arrayRemove, writeBatch } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyA3gohTf1rzOYBBQCI-WD8ORoTK4DOf-fw",
        authDomain: "akademia-c56ff.firebaseapp.com",
        databaseURL: "https://akademia-c56ff-default-rtdb.firebaseio.com",
        projectId: "akademia-c56ff",
        storageBucket: "akademia-c56ff.firebasestorage.app",
        messagingSenderId: "678278775270",
        appId: "1:678278775270:web:ed5aee3d358d613c8cd627",
        measurementId: "G-X3CHCJE5LK"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Session
    const sessionData = localStorage.getItem('galagram_session');
    if (!sessionData) window.location.href = "index.html";
    const session = JSON.parse(sessionData);
    const currentUser = session.username;
    let currentUserDoc = null;
    
    // State
    let currentTab = "public";
    let activePrivateChat = null; // { userId, username, realName, avatar, blocked }
    let publicUnsubscribe = null;
    let privateUnsubscribe = null;
    let replyToMessage = null; // { id, text, senderName }
    
    // DOM elements
    const backBtn = document.getElementById('backBtn');
    const conversationsPanel = document.getElementById('conversationsPanel');
    const messagesContainer = document.getElementById('messagesContainer');
    const inputArea = document.getElementById('inputArea');
    const chatTitle = document.getElementById('chatTitle');
    const cancelPrivateBtn = document.getElementById('cancelPrivateBtn');
    const blockBtn = document.getElementById('blockBtn');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPicker = document.getElementById('emojiPicker');
    
    // Helper: fetch user profile
    async function getUserProfile(username) {
        const docSnap = await getDoc(doc(db, "users", username));
        if (docSnap.exists()) return docSnap.data();
        return null;
    }
    
    // Helper: show notification
    function showToast(msg, type = "info") {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:white;padding:10px 20px;border-radius:40px;z-index:10000;font-size:0.85rem;`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Load current user data
    async function loadCurrentUser() {
        const docSnap = await getDoc(doc(db, "users", currentUser));
        if (docSnap.exists()) currentUserDoc = docSnap.data();
    }
    
    // ---------- PUBLIC CHAT ----------
    function loadPublicChat() {
        if (publicUnsubscribe) publicUnsubscribe();
        const q = query(collection(db, "chatMessages"), orderBy("timestamp", "asc"));
        publicUnsubscribe = onSnapshot(q, (snapshot) => {
            if (currentTab !== "public") return;
            messagesContainer.innerHTML = '';
            if (snapshot.empty) {
                messagesContainer.innerHTML = '<div class="empty-state">No messages yet. Be the first!</div>';
                return;
            }
            snapshot.forEach(docSnap => {
                const msg = docSnap.data();
                renderPublicMessage(msg, docSnap.id);
            });
            scrollToBottom();
        });
        // Show input area
        inputArea.style.display = 'flex';
        chatTitle.innerText = "Public Chat";
        blockBtn.style.display = 'none';
        cancelPrivateBtn.style.display = 'none';
    }
    
    function renderPublicMessage(msg, msgId) {
        const isOwn = msg.username === currentUser;
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isOwn ? 'own' : ''}`;
        let replyHtml = '';
        if (msg.replyTo) {
            replyHtml = `<div class="reply-preview">↩️ Replying to ${escapeHtml(msg.replyTo.senderName)}: ${escapeHtml(msg.replyTo.text.substring(0, 50))}</div>`;
        }
        messageDiv.innerHTML = `
            ${replyHtml}
            <div class="message-bubble">${escapeHtml(msg.text)}</div>
            <div class="message-info">
                <span>${escapeHtml(msg.username)}</span>
                <span>${formatTime(msg.timestamp)}</span>
            </div>
            <div class="message-actions">
                <span class="reply-action" data-id="${msgId}" data-text="${escapeHtml(msg.text)}" data-sender="${escapeHtml(msg.username)}">↩️ Reply</span>
                ${isOwn ? `<span class="edit-action" data-id="${msgId}" data-text="${escapeHtml(msg.text)}">✏️ Edit</span>` : ''}
                ${isOwn ? `<span class="delete-action" data-id="${msgId}">🗑️ Delete</span>` : ''}
            </div>
        `;
        messagesContainer.appendChild(messageDiv);
        
        // Attach event listeners
        messageDiv.querySelectorAll('.reply-action').forEach(el => {
            el.addEventListener('click', () => {
                replyToMessage = { id: el.dataset.id, text: el.dataset.text, senderName: el.dataset.sender };
                messageInput.placeholder = `Replying to ${replyToMessage.senderName}...`;
                messageInput.focus();
            });
        });
        if (isOwn) {
            messageDiv.querySelectorAll('.edit-action').forEach(el => {
                el.addEventListener('click', () => {
                    const newText = prompt("Edit your message:", el.dataset.text);
                    if (newText && newText.trim()) {
                        updateDoc(doc(db, "chatMessages", el.dataset.id), { text: newText.trim() });
                    }
                });
            });
            messageDiv.querySelectorAll('.delete-action').forEach(el => {
                el.addEventListener('click', async () => {
                    if (confirm("Delete this message?")) {
                        await deleteDoc(doc(db, "chatMessages", el.dataset.id));
                    }
                });
            });
        }
    }
    
    async function sendPublicMessage(text) {
        if (!text.trim()) return;
        const messageData = {
            username: currentUser,
            text: text.trim(),
            userAvatar: currentUserDoc?.profileImage || '',
            userVerified: currentUserDoc?.verified || "none",
            timestamp: serverTimestamp()
        };
        if (replyToMessage) {
            messageData.replyTo = { id: replyToMessage.id, text: replyToMessage.text, senderName: replyToMessage.senderName };
            replyToMessage = null;
            messageInput.placeholder = "Type a message...";
        }
        await addDoc(collection(db, "chatMessages"), messageData);
        messageInput.value = '';
        // Update chat message count
        const newCount = (currentUserDoc?.chatMessageCount || 0) + 1;
        await updateDoc(doc(db, "users", currentUser), { chatMessageCount: newCount });
        currentUserDoc.chatMessageCount = newCount;
    }
    
    // ---------- PRIVATE CHAT ----------
    // Store private messages in subcollection: users/{userId}/privateChats/{otherUserId}/messages
    // Also maintain a conversation list for each user.
    async function getOrCreatePrivateChat(otherUserId) {
        const chatId = [currentUser, otherUserId].sort().join('_');
        const chatRef = doc(db, "privateChats", chatId);
        const chatSnap = await getDoc(chatRef);
        if (!chatSnap.exists()) {
            await setDoc(chatRef, {
                participants: [currentUser, otherUserId],
                createdAt: new Date(),
                lastMessage: null,
                lastUpdated: new Date()
            });
        }
        return chatId;
    }
    
    // Load user's private conversations
    async function loadConversations() {
        const q = query(collection(db, "privateChats"), where("participants", "array-contains", currentUser));
        const snapshot = await getDocs(q);
        const convos = [];
        for (const docSnap of snapshot.docs) {
            const data = docSnap.data();
            const otherId = data.participants.find(p => p !== currentUser);
            const userProfile = await getUserProfile(otherId);
            if (userProfile) {
                // Check if blocked
                const blockedByOther = userProfile.blockedUsers?.includes(currentUser) || false;
                const blockedByMe = currentUserDoc?.blockedUsers?.includes(otherId) || false;
                convos.push({
                    chatId: docSnap.id,
                    otherUserId: otherId,
                    username: otherId,
                    realName: userProfile.realName || otherId,
                    avatar: userProfile.profileImage,
                    lastMessage: data.lastMessage,
                    lastUpdated: data.lastUpdated,
                    blocked: blockedByMe,
                    blockedByOther: blockedByOther
                });
            }
        }
        convos.sort((a,b) => (b.lastUpdated?.toDate?.() || 0) - (a.lastUpdated?.toDate?.() || 0));
        renderConversations(convos);
    }
    
    function renderConversations(conversations) {
        const container = document.getElementById('conversationsList');
        if (!container) return;
        if (conversations.length === 0) {
            container.innerHTML = '<div class="empty-state" style="padding:20px;">No conversations. Start a new one!</div>';
            return;
        }
        container.innerHTML = conversations.map(conv => `
            <div class="conversation-item ${activePrivateChat?.otherUserId === conv.otherUserId ? 'active' : ''}" data-userid="${conv.otherUserId}">
                <img class="conv-avatar" src="${conv.avatar || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt="">
                <div class="conv-details">
                    <div class="conv-name">${escapeHtml(conv.realName)} (@${conv.username})</div>
                    <div class="conv-last-msg">${conv.lastMessage ? escapeHtml(conv.lastMessage.substring(0, 40)) : 'No messages yet'}</div>
                </div>
                ${conv.blocked ? '<i class="bx bx-block" style="color:#ed4956;"></i>' : (conv.blockedByOther ? '<i class="bx bx-lock" style="color:#8e8e8e;"></i>' : '')}
            </div>
        `).join('');
        document.querySelectorAll('.conversation-item').forEach(el => {
            el.addEventListener('click', () => openPrivateChat(el.dataset.userid));
        });
    }
    
    async function openPrivateChat(otherUserId) {
        // Check block status
        const otherProfile = await getUserProfile(otherUserId);
        const isBlockedByMe = currentUserDoc?.blockedUsers?.includes(otherUserId);
        const isBlockedByOther = otherProfile?.blockedUsers?.includes(currentUser);
        if (isBlockedByOther) {
            showToast("You cannot message this user (you are blocked).");
            return;
        }
        activePrivateChat = {
            otherUserId: otherUserId,
            username: otherUserId,
            realName: otherProfile?.realName || otherUserId,
            avatar: otherProfile?.profileImage,
            blocked: isBlockedByMe || false
        };
        // Update UI
        chatTitle.innerText = `${escapeHtml(activePrivateChat.realName)} (@${activePrivateChat.username})`;
        blockBtn.style.display = 'flex';
        blockBtn.innerText = activePrivateChat.blocked ? "Unblock" : "Block";
        cancelPrivateBtn.style.display = 'block';
        inputArea.style.display = 'flex';
        // Load messages
        if (privateUnsubscribe) privateUnsubscribe();
        const chatId = [currentUser, otherUserId].sort().join('_');
        const messagesRef = collection(db, "privateChats", chatId, "messages");
        const q = query(messagesRef, orderBy("timestamp", "asc"));
        privateUnsubscribe = onSnapshot(q, (snapshot) => {
            if (!activePrivateChat || activePrivateChat.otherUserId !== otherUserId) return;
            messagesContainer.innerHTML = '';
            if (snapshot.empty) {
                messagesContainer.innerHTML = '<div class="empty-state">No messages yet. Start the conversation!</div>';
                return;
            }
            snapshot.forEach(docSnap => {
                const msg = docSnap.data();
                renderPrivateMessage(msg, docSnap.id);
            });
            scrollToBottom();
        });
        // Highlight active conversation in list
        loadConversations();
    }
    
    function renderPrivateMessage(msg, msgId) {
        const isOwn = msg.senderId === currentUser;
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isOwn ? 'own' : ''}`;
        let replyHtml = '';
        if (msg.replyTo) {
            replyHtml = `<div class="reply-preview">↩️ Replying to ${escapeHtml(msg.replyTo.senderName)}: ${escapeHtml(msg.replyTo.text.substring(0, 50))}</div>`;
        }
        let editedHtml = msg.edited ? ' <span style="font-size:0.7rem;">(edited)</span>' : '';
        messageDiv.innerHTML = `
            ${replyHtml}
            <div class="message-bubble">${escapeHtml(msg.text)}${editedHtml}</div>
            <div class="message-info">
                <span>${isOwn ? 'You' : escapeHtml(msg.senderName)}</span>
                <span>${formatTime(msg.timestamp)}</span>
            </div>
            <div class="message-actions">
                <span class="reply-action" data-id="${msgId}" data-text="${escapeHtml(msg.text)}" data-sender="${escapeHtml(msg.senderName)}">↩️ Reply</span>
                ${isOwn ? `<span class="edit-action" data-id="${msgId}" data-text="${escapeHtml(msg.text)}">✏️ Edit</span>` : ''}
                ${isOwn ? `<span class="delete-action" data-id="${msgId}">🗑️ Delete</span>` : ''}
            </div>
        `;
        messagesContainer.appendChild(messageDiv);
        
        messageDiv.querySelectorAll('.reply-action').forEach(el => {
            el.addEventListener('click', () => {
                replyToMessage = { id: el.dataset.id, text: el.dataset.text, senderName: el.dataset.sender };
                messageInput.placeholder = `Replying to ${replyToMessage.senderName}...`;
                messageInput.focus();
            });
        });
        if (isOwn) {
            messageDiv.querySelectorAll('.edit-action').forEach(el => {
                el.addEventListener('click', () => {
                    const newText = prompt("Edit your message:", el.dataset.text);
                    if (newText && newText.trim()) {
                        const chatId = [currentUser, activePrivateChat.otherUserId].sort().join('_');
                        updateDoc(doc(db, "privateChats", chatId, "messages", el.dataset.id), { text: newText.trim(), edited: true });
                    }
                });
            });
            messageDiv.querySelectorAll('.delete-action').forEach(el => {
                el.addEventListener('click', async () => {
                    if (confirm("Delete this message?")) {
                        const chatId = [currentUser, activePrivateChat.otherUserId].sort().join('_');
                        await deleteDoc(doc(db, "privateChats", chatId, "messages", el.dataset.id));
                    }
                });
            });
        }
    }
    
    async function sendPrivateMessage(text) {
        if (!activePrivateChat) return;
        if (activePrivateChat.blocked) {
            showToast("You have blocked this user. Unblock to send messages.");
            return;
        }
        if (!text.trim()) return;
        const chatId = [currentUser, activePrivateChat.otherUserId].sort().join('_');
        const messageData = {
            senderId: currentUser,
            senderName: currentUserDoc?.realName || currentUser,
            text: text.trim(),
            timestamp: serverTimestamp()
        };
        if (replyToMessage) {
            messageData.replyTo = { id: replyToMessage.id, text: replyToMessage.text, senderName: replyToMessage.senderName };
            replyToMessage = null;
            messageInput.placeholder = "Type a message...";
        }
        await addDoc(collection(db, "privateChats", chatId, "messages"), messageData);
        // Update last message in chat metadata
        await updateDoc(doc(db, "privateChats", chatId), {
            lastMessage: text.trim(),
            lastUpdated: new Date()
        });
        messageInput.value = '';
        // Reload conversations to update last message
        loadConversations();
    }
    
    async function blockCurrentUser() {
        if (!activePrivateChat) return;
        const isBlocked = currentUserDoc?.blockedUsers?.includes(activePrivateChat.otherUserId);
        if (isBlocked) {
            // Unblock
            await updateDoc(doc(db, "users", currentUser), {
                blockedUsers: arrayRemove(activePrivateChat.otherUserId)
            });
            currentUserDoc.blockedUsers = currentUserDoc.blockedUsers?.filter(id => id !== activePrivateChat.otherUserId) || [];
            showToast(`Unblocked ${activePrivateChat.realName}`);
            activePrivateChat.blocked = false;
            blockBtn.innerText = "Block";
        } else {
            // Block
            await updateDoc(doc(db, "users", currentUser), {
                blockedUsers: arrayUnion(activePrivateChat.otherUserId)
            });
            currentUserDoc.blockedUsers = [...(currentUserDoc.blockedUsers || []), activePrivateChat.otherUserId];
            showToast(`Blocked ${activePrivateChat.realName}. You cannot message them.`);
            activePrivateChat.blocked = true;
            blockBtn.innerText = "Unblock";
            // Optionally close chat? Keep open but block sending.
        }
        loadConversations(); // refresh list to show block icon
    }
    
    async function startNewConversation() {
        const username = document.getElementById('newConvUsername').value.trim();
        if (!username) return;
        if (username === currentUser) {
            showToast("You cannot chat with yourself.");
            return;
        }
        const userProfile = await getUserProfile(username);
        if (!userProfile) {
            showToast("User not found.");
            return;
        }
        // Check if already have a conversation
        const chatId = [currentUser, username].sort().join('_');
        const chatRef = doc(db, "privateChats", chatId);
        const chatSnap = await getDoc(chatRef);
        if (!chatSnap.exists()) {
            await setDoc(chatRef, {
                participants: [currentUser, username],
                createdAt: new Date(),
                lastMessage: null,
                lastUpdated: new Date()
            });
        }
        document.getElementById('newConvUsername').value = '';
        await loadConversations();
        openPrivateChat(username);
    }
    
    // ---------- UI Helpers ----------
    function scrollToBottom() {
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
    }
    
    function formatTime(timestamp) {
        if (!timestamp) return 'just now';
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        if (diff < 60) return `${diff}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return date.toLocaleDateString();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
    
    // ---------- Tab switching ----------
    async function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        
        if (tab === 'public') {
            conversationsPanel.style.display = 'none';
            if (publicUnsubscribe) publicUnsubscribe();
            if (privateUnsubscribe) privateUnsubscribe();
            activePrivateChat = null;
            loadPublicChat();
        } else {
            conversationsPanel.style.display = 'flex';
            if (publicUnsubscribe) publicUnsubscribe();
            messagesContainer.innerHTML = '<div class="empty-state">Select a conversation or start a new one</div>';
            inputArea.style.display = 'none';
            chatTitle.innerText = "Private Messages";
            blockBtn.style.display = 'none';
            cancelPrivateBtn.style.display = 'none';
            await loadConversations();
        }
    }
    
    // ---------- Event Listeners ----------
    backBtn.addEventListener('click', () => window.location.href = "home.html");
    sendBtn.addEventListener('click', async () => {
        const text = messageInput.value;
        if (currentTab === 'public') await sendPublicMessage(text);
        else if (activePrivateChat) await sendPrivateMessage(text);
    });
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });
    emojiBtn.addEventListener('click', () => {
        emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'block' : 'none';
    });
    emojiPicker.addEventListener('emoji-click', (e) => {
        messageInput.value += e.detail.unicode;
        emojiPicker.style.display = 'none';
        messageInput.focus();
    });
    document.addEventListener('click', (e) => {
        if (!emojiBtn.contains(e.target) && !emojiPicker.contains(e.target)) {
            emojiPicker.style.display = 'none';
        }
    });
    cancelPrivateBtn.addEventListener('click', () => {
        activePrivateChat = null;
        if (privateUnsubscribe) privateUnsubscribe();
        messagesContainer.innerHTML = '<div class="empty-state">Select a conversation to start messaging</div>';
        inputArea.style.display = 'none';
        chatTitle.innerText = "Private Messages";
        blockBtn.style.display = 'none';
        cancelPrivateBtn.style.display = 'none';
        loadConversations();
    });
    blockBtn.addEventListener('click', blockCurrentUser);
    document.getElementById('startConvBtn').addEventListener('click', startNewConversation);
    document.getElementById('newConvUsername').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') startNewConversation();
    });
    
    // Initial load
    await loadCurrentUser();
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
    switchTab('public');
</script>
</body>
</html>
