<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Galagram • Chat</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.9.0/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Header */
        .header {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            font-size: 1.6rem;
            cursor: pointer;
            color: #262626;
        }
        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #f77737, #d62976, #962fbf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid #dbdbdb;
            background: white;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-weight: 600;
            color: #8e8e8e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #0095f6;
            border-bottom-color: #0095f6;
        }
        /* Main chat layout */
        .chat-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* Conversations sidebar (private) */
        .conversations-panel {
            width: 320px;
            border-right: 1px solid #dbdbdb;
            background: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .conversation-item {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #efefef;
            transition: background 0.1s;
        }
        .conversation-item:hover {
            background: #f8f8f8;
        }
        .conversation-item.active {
            background: #eef7ff;
        }
        .conv-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .conv-details {
            flex: 1;
        }
        .conv-name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .conv-last-msg {
            font-size: 0.75rem;
            color: #8e8e8e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .new-conversation {
            padding: 12px 16px;
            border-bottom: 1px solid #dbdbdb;
            background: #fafafa;
        }
        .new-conversation input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .search-results {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 8px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .search-result-item {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid #efefef;
        }
        .search-result-item:hover {
            background: #f0f0f0;
        }
        /* Messages panel */
        .messages-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            overflow: hidden;
        }
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }
        .chat-header .cancel-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #ed4956;
            display: none;
        }
        .chat-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }
        .chat-header .block-btn {
            background: none;
            border: none;
            color: #ed4956;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            align-self: flex-start;
            position: relative;
        }
        .message.own {
            align-self: flex-end;
        }
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }
        .message-sender {
            font-weight: 600;
            font-size: 0.8rem;
        }
        .verified-badge {
            font-size: 0.8rem;
        }
        .verified-badge.blue {
            color: #0095f6;
        }
        .verified-badge.gray {
            color: #8e8e8e;
        }
        .message-bubble {
            background: #efefef;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            word-wrap: break-word;
        }
        .message.own .message-bubble {
            background: #0095f6;
            color: white;
        }
        .message-info {
            font-size: 0.7rem;
            color: #8e8e8e;
            margin-top: 4px;
            margin-left: 8px;
        }
        .message-actions-btn {
            position: absolute;
            right: 0;
            top: 0;
            cursor: pointer;
            padding: 4px;
            background: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .message:hover .message-actions-btn {
            opacity: 1;
        }
        .message.own .message-actions-btn {
            right: auto;
            left: 0;
        }
        .dropdown-menu {
            position: absolute;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 1000;
            min-width: 120px;
            overflow: hidden;
        }
        .dropdown-menu div {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .dropdown-menu div:hover {
            background: #f0f0f0;
        }
        .reply-preview {
            font-size: 0.7rem;
            background: #e0e0e0;
            padding: 4px 8px;
            border-radius: 12px;
            margin-bottom: 4px;
            color: #555;
        }
        .message.own .reply-preview {
            background: #006bbf;
            color: #ddd;
        }
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid #dbdbdb;
            display: flex;
            gap: 10px;
            align-items: center;
            background: white;
        }
        .emoji-btn {
            font-size: 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        .message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #dbdbdb;
            border-radius: 24px;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
        }
        .send-btn {
            background: #0095f6;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        emoji-picker {
            position: absolute;
            bottom: 70px;
            right: 20px;
            z-index: 100;
            width: 320px;
            max-height: 400px;
            display: none;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8e8e8e;
        }
        /* Custom edit modal */
        .edit-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .edit-modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
        }
        .edit-modal textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            font-size: 0.9rem;
            margin: 12px 0;
        }
        .edit-modal .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .edit-modal button {
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
        }
        .edit-modal .save-btn {
            background: #0095f6;
            color: white;
        }
        @media (max-width: 768px) {
            .chat-layout {
                flex-direction: column;
            }
            .conversations-panel {
                width: 100%;
                max-height: 40%;
                border-right: none;
                border-bottom: 1px solid #dbdbdb;
            }
            .messages-panel {
                height: 60%;
            }
            .chat-header .cancel-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <i class='bx bx-arrow-back back-btn' id="backBtn"></i>
        <div class="logo">Galagram Chat</div>
    </div>
    <div class="tabs">
        <div class="tab active" data-tab="public">🌍 PUBLIC</div>
        <div class="tab" data-tab="private">💬 PRIVATE</div>
    </div>
    <div class="chat-layout" id="chatLayout">
        <!-- Private conversations sidebar -->
        <div id="conversationsPanel" class="conversations-panel" style="display: none;">
            <div class="new-conversation">
                <input type="text" id="newConvSearch" placeholder="Search username or real name...">
                <div id="searchResults" class="search-results" style="display: none;"></div>
            </div>
            <div id="conversationsList"></div>
        </div>
        <!-- Messages panel -->
        <div id="messagesPanel" class="messages-panel">
            <div class="chat-header">
                <button id="cancelPrivateBtn" class="cancel-btn"><i class='bx bx-x'></i> Cancel</button>
                <h3 id="chatTitle">Select a chat</h3>
                <button id="blockBtn" class="block-btn" style="display: none;">Block</button>
            </div>
            <div id="messagesContainer" class="messages-container">
                <div class="empty-state">Select a conversation to start messaging</div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <button id="emojiBtn" class="emoji-btn"><i class='bx bx-smile'></i></button>
                <textarea id="messageInput" class="message-input" rows="1" placeholder="Type a message..."></textarea>
                <button id="sendBtn" class="send-btn"><i class='bx bx-send'></i></button>
            </div>
        </div>
    </div>
    <emoji-picker id="emojiPicker"></emoji-picker>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, onSnapshot, addDoc, orderBy, deleteDoc, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyA3gohTf1rzOYBBQCI-WD8ORoTK4DOf-fw",
        authDomain: "akademia-c56ff.firebaseapp.com",
        databaseURL: "https://akademia-c56ff-default-rtdb.firebaseio.com",
        projectId: "akademia-c56ff",
        storageBucket: "akademia-c56ff.firebasestorage.app",
        messagingSenderId: "678278775270",
        appId: "1:678278775270:web:ed5aee3d358d613c8cd627",
        measurementId: "G-X3CHCJE5LK"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Session
    const sessionData = localStorage.getItem('galagram_session');
    if (!sessionData) window.location.href = "index.html";
    const session = JSON.parse(sessionData);
    const currentUser = session.username;
    let currentUserDoc = null;
    
    // State
    let currentTab = "public";
    let activePrivateChat = null;
    let publicUnsubscribe = null;
    let privateUnsubscribe = null;
    let replyToMessage = null;
    let activeDropdown = null;
    
    // DOM elements
    const backBtn = document.getElementById('backBtn');
    const conversationsPanel = document.getElementById('conversationsPanel');
    const messagesContainer = document.getElementById('messagesContainer');
    const inputArea = document.getElementById('inputArea');
    const chatTitle = document.getElementById('chatTitle');
    const cancelPrivateBtn = document.getElementById('cancelPrivateBtn');
    const blockBtn = document.getElementById('blockBtn');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPicker = document.getElementById('emojiPicker');
    const newConvSearch = document.getElementById('newConvSearch');
    const searchResults = document.getElementById('searchResults');
    
    // Helper functions
    async function getUserProfile(username) {
        const docSnap = await getDoc(doc(db, "users", username));
        if (docSnap.exists()) return docSnap.data();
        return null;
    }
    
    function showToast(msg, type = "info") {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:white;padding:10px 20px;border-radius:40px;z-index:10000;font-size:0.85rem;`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function formatTime(timestamp) {
        if (!timestamp) return 'just now';
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        if (diff < 60) return `${diff}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return date.toLocaleDateString();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
    
    function getVerifiedIcon(verified) {
        if (verified === "blue") return '<i class="bx bx-check-circle verified-badge blue"></i>';
        if (verified === "gray") return '<i class="bx bxs-check-circle verified-badge gray"></i>';
        return '';
    }
    
    function scrollToBottom() {
        setTimeout(() => messagesContainer.scrollTop = messagesContainer.scrollHeight, 100);
    }
    
    // Custom edit modal
    function showEditModal(currentText, onSave) {
        const overlay = document.createElement('div');
        overlay.className = 'edit-modal-overlay';
        overlay.innerHTML = `
            <div class="edit-modal">
                <h4>Edit message</h4>
                <textarea id="editTextarea" rows="3">${escapeHtml(currentText)}</textarea>
                <div class="modal-buttons">
                    <button class="cancel-edit">Cancel</button>
                    <button class="save-btn">Save</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        const textarea = overlay.querySelector('#editTextarea');
        const saveBtn = overlay.querySelector('.save-btn');
        const cancelBtn = overlay.querySelector('.cancel-edit');
        saveBtn.onclick = () => {
            const newText = textarea.value.trim();
            if (newText) onSave(newText);
            overlay.remove();
        };
        cancelBtn.onclick = () => overlay.remove();
        textarea.focus();
    }
    
    // ---------- PUBLIC CHAT ----------
    async function loadPublicChat() {
        if (publicUnsubscribe) publicUnsubscribe();
        const q = query(collection(db, "chatMessages"), orderBy("timestamp", "asc"));
        publicUnsubscribe = onSnapshot(q, (snapshot) => {
            if (currentTab !== "public") return;
            messagesContainer.innerHTML = '';
            if (snapshot.empty) {
                messagesContainer.innerHTML = '<div class="empty-state">No messages yet. Be the first!</div>';
                return;
            }
            snapshot.forEach(docSnap => {
                const msg = docSnap.data();
                renderPublicMessage(msg, docSnap.id);
            });
            scrollToBottom();
        });
        inputArea.style.display = 'flex';
        chatTitle.innerText = "Public Chat";
        blockBtn.style.display = 'none';
        cancelPrivateBtn.style.display = 'none';
    }
    
    async function renderPublicMessage(msg, msgId) {
        const isOwn = msg.username === currentUser;
        const userProfile = await getUserProfile(msg.username);
        const avatar = userProfile?.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=40';
        const verified = userProfile?.verified || "none";
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isOwn ? 'own' : ''}`;
        messageDiv.dataset.id = msgId;
        let replyHtml = '';
        if (msg.replyTo) {
            replyHtml = `<div class="reply-preview">↩️ Replying to ${escapeHtml(msg.replyTo.senderName)}: ${escapeHtml(msg.replyTo.text.substring(0, 50))}</div>`;
        }
        messageDiv.innerHTML = `
            <div class="message-header">
                <img class="message-avatar" src="${avatar}" alt="">
                <span class="message-sender">${escapeHtml(msg.username)}</span>
                ${getVerifiedIcon(verified)}
            </div>
            ${replyHtml}
            <div class="message-bubble">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size:0.7rem;">(edited)</span>' : ''}</div>
            <div class="message-info">
                <span>${formatTime(msg.timestamp)}</span>
            </div>
            <div class="message-actions-btn"><i class='bx bx-dots-vertical-rounded'></i></div>
        `;
        messagesContainer.appendChild(messageDiv);
        
        const actionsBtn = messageDiv.querySelector('.message-actions-btn');
        actionsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeDropdown();
            const dropdown = document.createElement('div');
            dropdown.className = 'dropdown-menu';
            dropdown.innerHTML = `
                <div class="reply-action">↩️ Reply</div>
                ${isOwn ? `<div class="edit-action">✏️ Edit</div>` : ''}
                ${isOwn ? `<div class="delete-action">🗑️ Delete</div>` : ''}
            `;
            const rect = actionsBtn.getBoundingClientRect();
            dropdown.style.position = 'fixed';
            dropdown.style.top = `${rect.bottom + 4}px`;
            dropdown.style.left = `${rect.left}px`;
            document.body.appendChild(dropdown);
            activeDropdown = dropdown;
            
            dropdown.querySelector('.reply-action')?.addEventListener('click', () => {
                replyToMessage = { id: msgId, text: msg.text, senderName: msg.username };
                messageInput.placeholder = `Replying to ${replyToMessage.senderName}...`;
                messageInput.focus();
                closeDropdown();
            });
            if (isOwn) {
                dropdown.querySelector('.edit-action')?.addEventListener('click', () => {
                    showEditModal(msg.text, async (newText) => {
                        await updateDoc(doc(db, "chatMessages", msgId), { text: newText, edited: true });
                    });
                    closeDropdown();
                });
                dropdown.querySelector('.delete-action')?.addEventListener('click', async () => {
                    if (confirm("Delete this message?")) await deleteDoc(doc(db, "chatMessages", msgId));
                    closeDropdown();
                });
            }
        });
    }
    
    async function sendPublicMessage(text) {
        if (!text.trim()) return;
        const messageData = {
            username: currentUser,
            text: text.trim(),
            userAvatar: currentUserDoc?.profileImage || '',
            userVerified: currentUserDoc?.verified || "none",
            timestamp: serverTimestamp()
        };
        if (replyToMessage) {
            messageData.replyTo = { id: replyToMessage.id, text: replyToMessage.text, senderName: replyToMessage.senderName };
            replyToMessage = null;
            messageInput.placeholder = "Type a message...";
        }
        await addDoc(collection(db, "chatMessages"), messageData);
        messageInput.value = '';
        const newCount = (currentUserDoc?.chatMessageCount || 0) + 1;
        await updateDoc(doc(db, "users", currentUser), { chatMessageCount: newCount });
        currentUserDoc.chatMessageCount = newCount;
    }
    
    // ---------- PRIVATE CHAT ----------
    async function getOrCreatePrivateChat(otherUserId) {
        const chatId = [currentUser, otherUserId].sort().join('_');
        const chatRef = doc(db, "privateChats", chatId);
        const chatSnap = await getDoc(chatRef);
        if (!chatSnap.exists()) {
            await setDoc(chatRef, {
                participants: [currentUser, otherUserId],
                createdAt: new Date(),
                lastMessage: null,
                lastUpdated: new Date()
            });
        }
        return chatId;
    }
    
    async function loadConversations() {
        const q = query(collection(db, "privateChats"), where("participants", "array-contains", currentUser));
        const snapshot = await getDocs(q);
        const convos = [];
        for (const docSnap of snapshot.docs) {
            const data = docSnap.data();
            const otherId = data.participants.find(p => p !== currentUser);
            const userProfile = await getUserProfile(otherId);
            if (userProfile) {
                const blockedByOther = userProfile.blockedUsers?.includes(currentUser) || false;
                const blockedByMe = currentUserDoc?.blockedUsers?.includes(otherId) || false;
                convos.push({
                    chatId: docSnap.id,
                    otherUserId: otherId,
                    username: otherId,
                    realName: userProfile.realName || otherId,
                    avatar: userProfile.profileImage,
                    lastMessage: data.lastMessage,
                    lastUpdated: data.lastUpdated,
                    blocked: blockedByMe,
                    blockedByOther: blockedByOther
                });
            }
        }
        convos.sort((a,b) => (b.lastUpdated?.toDate?.() || 0) - (a.lastUpdated?.toDate?.() || 0));
        renderConversations(convos);
    }
    
    function renderConversations(conversations) {
        const container = document.getElementById('conversationsList');
        if (!container) return;
        if (conversations.length === 0) {
            container.innerHTML = '<div class="empty-state" style="padding:20px;">No conversations. Start a new one!</div>';
            return;
        }
        container.innerHTML = conversations.map(conv => `
            <div class="conversation-item ${activePrivateChat?.otherUserId === conv.otherUserId ? 'active' : ''}" data-userid="${conv.otherUserId}">
                <img class="conv-avatar" src="${conv.avatar || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt="">
                <div class="conv-details">
                    <div class="conv-name">${escapeHtml(conv.realName)} (@${conv.username})</div>
                    <div class="conv-last-msg">${conv.lastMessage ? escapeHtml(conv.lastMessage.substring(0, 40)) : 'No messages yet'}</div>
                </div>
                ${conv.blocked ? '<i class="bx bx-block" style="color:#ed4956;"></i>' : (conv.blockedByOther ? '<i class="bx bx-lock" style="color:#8e8e8e;"></i>' : '')}
            </div>
        `).join('');
        document.querySelectorAll('.conversation-item').forEach(el => {
            el.addEventListener('click', () => openPrivateChat(el.dataset.userid));
        });
    }
    
    async function openPrivateChat(otherUserId) {
        const otherProfile = await getUserProfile(otherUserId);
        const isBlockedByMe = currentUserDoc?.blockedUsers?.includes(otherUserId);
        const isBlockedByOther = otherProfile?.blockedUsers?.includes(currentUser);
        if (isBlockedByOther) {
            showToast("You cannot message this user (you are blocked).");
            return;
        }
        activePrivateChat = {
            otherUserId: otherUserId,
            username: otherUserId,
            realName: otherProfile?.realName || otherUserId,
            avatar: otherProfile?.profileImage,
            blocked: isBlockedByMe || false
        };
        chatTitle.innerText = `${escapeHtml(activePrivateChat.realName)} (@${activePrivateChat.username})`;
        blockBtn.style.display = 'flex';
        blockBtn.innerText = activePrivateChat.blocked ? "Unblock" : "Block";
        cancelPrivateBtn.style.display = 'block';
        inputArea.style.display = 'flex';
        if (privateUnsubscribe) privateUnsubscribe();
        const chatId = [currentUser, otherUserId].sort().join('_');
        const messagesRef = collection(db, "privateChats", chatId, "messages");
        const q = query(messagesRef, orderBy("timestamp", "asc"));
        privateUnsubscribe = onSnapshot(q, (snapshot) => {
            if (!activePrivateChat || activePrivateChat.otherUserId !== otherUserId) return;
            messagesContainer.innerHTML = '';
            if (snapshot.empty) {
                messagesContainer.innerHTML = '<div class="empty-state">No messages yet. Start the conversation!</div>';
                return;
            }
            snapshot.forEach(docSnap => {
                const msg = docSnap.data();
                renderPrivateMessage(msg, docSnap.id, chatId);
            });
            scrollToBottom();
        });
        loadConversations();
    }
    
    function renderPrivateMessage(msg, msgId, chatId) {
        const isOwn = msg.senderId === currentUser;
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isOwn ? 'own' : ''}`;
        messageDiv.dataset.id = msgId;
        let replyHtml = '';
        if (msg.replyTo) {
            replyHtml = `<div class="reply-preview">↩️ Replying to ${escapeHtml(msg.replyTo.senderName)}: ${escapeHtml(msg.replyTo.text.substring(0, 50))}</div>`;
        }
        messageDiv.innerHTML = `
            ${replyHtml}
            <div class="message-bubble">${escapeHtml(msg.text)}${msg.edited ? ' <span style="font-size:0.7rem;">(edited)</span>' : ''}</div>
            <div class="message-info">
                <span>${isOwn ? 'You' : escapeHtml(msg.senderName)}</span>
                <span>${formatTime(msg.timestamp)}</span>
            </div>
            <div class="message-actions-btn"><i class='bx bx-dots-vertical-rounded'></i></div>
        `;
        messagesContainer.appendChild(messageDiv);
        
        const actionsBtn = messageDiv.querySelector('.message-actions-btn');
        actionsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeDropdown();
            const dropdown = document.createElement('div');
            dropdown.className = 'dropdown-menu';
            dropdown.innerHTML = `
                <div class="reply-action">↩️ Reply</div>
                ${isOwn ? `<div class="edit-action">✏️ Edit</div>` : ''}
                ${isOwn ? `<div class="delete-action">🗑️ Delete</div>` : ''}
            `;
            const rect = actionsBtn.getBoundingClientRect();
            dropdown.style.position = 'fixed';
            dropdown.style.top = `${rect.bottom + 4}px`;
            dropdown.style.left = `${rect.left}px`;
            document.body.appendChild(dropdown);
            activeDropdown = dropdown;
            
            dropdown.querySelector('.reply-action')?.addEventListener('click', () => {
                replyToMessage = { id: msgId, text: msg.text, senderName: isOwn ? 'You' : msg.senderName };
                messageInput.placeholder = `Replying to ${replyToMessage.senderName}...`;
                messageInput.focus();
                closeDropdown();
            });
            if (isOwn) {
                dropdown.querySelector('.edit-action')?.addEventListener('click', () => {
                    showEditModal(msg.text, async (newText) => {
                        await updateDoc(doc(db, "privateChats", chatId, "messages", msgId), { text: newText, edited: true });
                    });
                    closeDropdown();
                });
                dropdown.querySelector('.delete-action')?.addEventListener('click', async () => {
                    if (confirm("Delete this message?")) await deleteDoc(doc(db, "privateChats", chatId, "messages", msgId));
                    closeDropdown();
                });
            }
        });
    }
    
    async function sendPrivateMessage(text) {
        if (!activePrivateChat) return;
        if (activePrivateChat.blocked) {
            showToast("You have blocked this user. Unblock to send messages.");
            return;
        }
        if (!text.trim()) return;
        const chatId = [currentUser, activePrivateChat.otherUserId].sort().join('_');
        const messageData = {
            senderId: currentUser,
            senderName: currentUserDoc?.realName || currentUser,
            text: text.trim(),
            timestamp: serverTimestamp()
        };
        if (replyToMessage) {
            messageData.replyTo = { id: replyToMessage.id, text: replyToMessage.text, senderName: replyToMessage.senderName };
            replyToMessage = null;
            messageInput.placeholder = "Type a message...";
        }
        await addDoc(collection(db, "privateChats", chatId, "messages"), messageData);
        await updateDoc(doc(db, "privateChats", chatId), {
            lastMessage: text.trim(),
            lastUpdated: new Date()
        });
        messageInput.value = '';
        loadConversations();
    }
    
    async function blockCurrentUser() {
        if (!activePrivateChat) return;
        const isBlocked = currentUserDoc?.blockedUsers?.includes(activePrivateChat.otherUserId);
        if (isBlocked) {
            await updateDoc(doc(db, "users", currentUser), {
                blockedUsers: arrayRemove(activePrivateChat.otherUserId)
            });
            currentUserDoc.blockedUsers = currentUserDoc.blockedUsers?.filter(id => id !== activePrivateChat.otherUserId) || [];
            showToast(`Unblocked ${activePrivateChat.realName}`);
            activePrivateChat.blocked = false;
            blockBtn.innerText = "Block";
        } else {
            await updateDoc(doc(db, "users", currentUser), {
                blockedUsers: arrayUnion(activePrivateChat.otherUserId)
            });
            currentUserDoc.blockedUsers = [...(currentUserDoc.blockedUsers || []), activePrivateChat.otherUserId];
            showToast(`Blocked ${activePrivateChat.realName}. You cannot message them.`);
            activePrivateChat.blocked = true;
            blockBtn.innerText = "Unblock";
        }
        loadConversations();
    }
    
    // Live search for users
    let searchTimeout = null;
    newConvSearch.addEventListener('input', () => {
        if (searchTimeout) clearTimeout(searchTimeout);
        const query = newConvSearch.value.trim().toLowerCase();
        if (query.length < 2) {
            searchResults.style.display = 'none';
            return;
        }
        searchTimeout = setTimeout(async () => {
            const usersRef = collection(db, "users");
            const snapshot = await getDocs(usersRef);
            const matches = [];
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const username = docSnap.id;
                if (username === currentUser) return;
                const realName = data.realName || '';
                if (username.toLowerCase().includes(query) || realName.toLowerCase().includes(query)) {
                    matches.push({ username, realName, avatar: data.profileImage });
                }
            });
            if (matches.length === 0) {
                searchResults.style.display = 'none';
                return;
            }
            searchResults.style.display = 'block';
            searchResults.innerHTML = matches.map(u => `
                <div class="search-result-item" data-username="${u.username}">
                    <img src="${u.avatar || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=36'}" style="width:36px;height:36px;border-radius:50%;">
                    <div>
                        <div><strong>${escapeHtml(u.realName)}</strong></div>
                        <div style="font-size:0.75rem;color:#8e8e8e;">@${u.username}</div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.search-result-item').forEach(el => {
                el.addEventListener('click', async () => {
                    const username = el.dataset.username;
                    const userProfile = await getUserProfile(username);
                    if (!userProfile) return;
                    const chatId = [currentUser, username].sort().join('_');
                    const chatRef = doc(db, "privateChats", chatId);
                    const chatSnap = await getDoc(chatRef);
                    if (!chatSnap.exists()) {
                        await setDoc(chatRef, {
                            participants: [currentUser, username],
                            createdAt: new Date(),
                            lastMessage: null,
                            lastUpdated: new Date()
                        });
                    }
                    newConvSearch.value = '';
                    searchResults.style.display = 'none';
                    await loadConversations();
                    openPrivateChat(username);
                });
            });
        }, 300);
    });
    
    function closeDropdown() {
        if (activeDropdown) {
            activeDropdown.remove();
            activeDropdown = null;
        }
    }
    document.addEventListener('click', () => closeDropdown());
    
    // Tab switching
    async function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        closeDropdown();
        if (tab === 'public') {
            conversationsPanel.style.display = 'none';
            if (privateUnsubscribe) privateUnsubscribe();
            activePrivateChat = null;
            loadPublicChat();
        } else {
            conversationsPanel.style.display = 'flex';
            if (publicUnsubscribe) publicUnsubscribe();
            messagesContainer.innerHTML = '<div class="empty-state">Select a conversation or start a new one</div>';
            inputArea.style.display = 'none';
            chatTitle.innerText = "Private Messages";
            blockBtn.style.display = 'none';
            cancelPrivateBtn.style.display = 'none';
            await loadConversations();
        }
    }
    
    // Event listeners
    backBtn.addEventListener('click', () => window.location.href = "home.html");
    sendBtn.addEventListener('click', async () => {
        const text = messageInput.value;
        if (currentTab === 'public') await sendPublicMessage(text);
        else if (activePrivateChat) await sendPrivateMessage(text);
    });
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });
    emojiBtn.addEventListener('click', () => {
        emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'block' : 'none';
    });
    emojiPicker.addEventListener('emoji-click', (e) => {
        messageInput.value += e.detail.unicode;
        emojiPicker.style.display = 'none';
        messageInput.focus();
    });
    document.addEventListener('click', (e) => {
        if (!emojiBtn.contains(e.target) && !emojiPicker.contains(e.target)) {
            emojiPicker.style.display = 'none';
        }
    });
    cancelPrivateBtn.addEventListener('click', () => {
        activePrivateChat = null;
        if (privateUnsubscribe) privateUnsubscribe();
        messagesContainer.innerHTML = '<div class="empty-state">Select a conversation to start messaging</div>';
        inputArea.style.display = 'none';
        chatTitle.innerText = "Private Messages";
        blockBtn.style.display = 'none';
        cancelPrivateBtn.style.display = 'none';
        loadConversations();
    });
    blockBtn.addEventListener('click', blockCurrentUser);
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
    
    // Load current user data
    const userDoc = await getDoc(doc(db, "users", currentUser));
    if (userDoc.exists()) currentUserDoc = userDoc.data();
    switchTab('public');
</script>
</body>
</html>
