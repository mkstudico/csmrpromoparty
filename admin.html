<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galagram • Admin</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA3gohTf1rzOYBBQCI-WD8ORoTK4DOf-fw",
            authDomain: "akademia-c56ff.firebaseapp.com",
            databaseURL: "https://akademia-c56ff-default-rtdb.firebaseio.com",
            projectId: "akademia-c56ff",
            storageBucket: "akademia-c56ff.firebasestorage.app",
            messagingSenderId: "678278775270",
            appId: "1:678278775270:web:ed5aee3d358d613c8cd627",
            measurementId: "G-X3CHCJE5LK"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .app-container { display: block; max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; }
        .header { background: #ffffff; padding: 12px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 0.5px solid #efefef; }
        .back-btn { font-size: 1.6rem; cursor: pointer; }
        .logo { font-weight: 620; font-size: 1.3rem; background: linear-gradient(135deg, #f77737, #d62976, #962fbf); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .content { padding: 16px; background: #fafafa; min-height: 85vh; }
        .user-item { background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .user-name { font-weight: 600; }
        .badge-select { padding: 6px 12px; border-radius: 20px; border: 1px solid #dbdbdb; background: white; cursor: pointer; }
        .galagram-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(0,0,0,0.85); color: white; padding: 12px 20px; border-radius: 40px; z-index: 10000; transition: transform 0.25s; }
        .galagram-toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div id="appRoot" class="app-container">
    <div class="header"><i class='bx bx-arrow-back back-btn' id="backBtn"></i><div class="logo">Admin • Verify Users</div></div>
    <div class="content" id="contentArea"><div style="text-align:center; padding:40px;">Loading users...</div></div>
</div>

<script type="module">
    import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const db = window.db;
    
    function showNotification(message) {
        const toast = document.createElement('div');
        toast.className = 'galagram-toast';
        toast.innerHTML = `<i class='bx bx-check-circle'></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => toast.remove(), 2000);
    }
    
    const sessionData = localStorage.getItem('galagram_session');
    if (!sessionData) window.location.href = "index.html";
    const session = JSON.parse(sessionData);
    
    // Simple admin check - you can set a specific admin username
    if (session.username !== "admin") {
        showNotification("Admin access only");
        setTimeout(() => window.location.href = "home.html", 1500);
    }
    
    async function loadUsers() {
        const usersRef = collection(db, "users");
        const snapshot = await getDocs(usersRef);
        const container = document.getElementById('contentArea');
        let html = '';
        snapshot.forEach(docSnap => {
            const user = docSnap.data();
            const currentBadge = user.verified || "none";
            html += `
                <div class="user-item" data-id="${docSnap.id}">
                    <div class="user-info">
                        <img class="user-avatar" src="${user.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt="">
                        <div>
                            <div class="user-name">${escapeHtml(user.realName)}</div>
                            <div style="font-size:0.7rem; color:#8e8e8e;">@${user.username}</div>
                        </div>
                    </div>
                    <select class="badge-select" data-id="${docSnap.id}">
                        <option value="none" ${currentBadge === 'none' ? 'selected' : ''}>No badge</option>
                        <option value="gray" ${currentBadge === 'gray' ? 'selected' : ''}>Gray ✓</option>
                        <option value="blue" ${currentBadge === 'blue' ? 'selected' : ''}>Blue ✓✓</option>
                    </select>
                </div>
            `;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.badge-select').forEach(select => {
            select.addEventListener('change', async (e) => {
                const userId = select.dataset.id;
                const newBadge = select.value;
                await updateDoc(doc(db, "users", userId), { verified: newBadge });
                showNotification(`Badge updated for user`);
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('backBtn').addEventListener('click', () => { window.location.href = "home.html"; });
    loadUsers();
</script>
</body>
</html>
