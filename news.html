<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galagram • Post</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyA3gohTf1rzOYBBQCI-WD8ORoTK4DOf-fw",
            authDomain: "akademia-c56ff.firebaseapp.com",
            databaseURL: "https://akademia-c56ff-default-rtdb.firebaseio.com",
            projectId: "akademia-c56ff",
            storageBucket: "akademia-c56ff.firebasestorage.app",
            messagingSenderId: "678278775270",
            appId: "1:678278775270:web:ed5aee3d358d613c8cd627",
            measurementId: "G-X3CHCJE5LK"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .pc-blocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .app-container { display: block; max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; }
        .header { background: #ffffff; padding: 12px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 0.5px solid #efefef; }
        .back-btn { font-size: 1.6rem; cursor: pointer; color: #262626; }
        .logo { font-weight: 620; font-size: 1.3rem; background: linear-gradient(135deg, #f77737, #d62976, #962fbf); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .content { padding: 16px; background: #fafafa; min-height: 85vh; }
        .post-card { background: white; border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid #efefef; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .post-author { font-weight: 600; font-size: 0.9rem; }
        .post-time { font-size: 0.65rem; color: #8e8e8e; }
        .post-text { padding: 12px; font-size: 0.95rem; }
        .post-image { width: 100%; max-height: 300px; object-fit: cover; }
        .comments-section { background: white; border-radius: 16px; padding: 16px; }
        .comment-input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input { flex: 1; padding: 10px; border: 1px solid #dbdbdb; border-radius: 24px; font-size: 0.85rem; }
        .comment-btn { background: #0095f6; color: white; border: none; padding: 8px 20px; border-radius: 24px; font-weight: 600; cursor: pointer; }
        .comment-item { display: flex; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 0.5px solid #efefef; }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .comment-user { font-weight: 600; font-size: 0.8rem; }
        .comment-text { font-size: 0.85rem; margin-top: 4px; }
        .galagram-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); color: white; padding: 12px 20px; border-radius: 40px; z-index: 10000; transition: transform 0.25s; pointer-events: none; }
        .galagram-toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
<div id="pcBlocker" class="pc-blocker"><i class='bx bx-mobile-alt'></i><p>Use your phone — PC is not supported</p></div>
<div id="appRoot" class="app-container">
    <div class="header"><i class='bx bx-arrow-back back-btn' id="backBtn"></i><div class="logo">Post</div></div>
    <div class="content" id="contentArea">Loading...</div>
</div>
<script type="module">
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const db = window.db;
    async function addLog(type, actor, target, message) { try { await addDoc(collection(db, "logs"), { type, actor, target, message, timestamp: new Date() }); } catch(e) {} }
    function showNotification(msg) { const toast=document.createElement('div'); toast.className='galagram-toast'; toast.innerHTML=`<i class='bx bx-check-circle'></i><span>${msg}</span>`; document.body.appendChild(toast); setTimeout(()=>toast.classList.add('show'),10); setTimeout(()=>toast.remove(),3000); }
    const sessionData=localStorage.getItem('galagram_session'); if(!sessionData) window.location.href="index.html"; const session=JSON.parse(sessionData); const currentUsername=session.username;
    const urlParams=new URLSearchParams(window.location.search); const postId=urlParams.get('id'); if(!postId) window.location.href="home.html";
    let postData=null, currentUser=null;
    async function loadData(){ const postDoc=await getDoc(doc(db,"news",postId)); const userDoc=await getDoc(doc(db,"users",currentUsername)); if(!postDoc.exists()){ showNotification("Post not found"); setTimeout(()=>window.location.href="home.html",1500); return; } postData={id:postDoc.id,...postDoc.data()}; currentUser=userDoc.data(); render(); }
    function getVerifiedIcon(verified){ if(verified==="blue") return '<i class="bx bx-check-circle" style="color:#0095f6;"></i>'; if(verified==="gray") return '<i class="bx bxs-check-circle" style="color:#8e8e8e;"></i>'; return ''; }
    function render(){ const container=document.getElementById('contentArea'); const verifiedIcon=getVerifiedIcon(postData.authorVerified); container.innerHTML=`<div class="post-card"><div class="post-header"><img class="post-avatar" src="${postData.authorAvatar||'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt=""><div><div class="post-author">${escapeHtml(postData.authorName)} ${verifiedIcon}</div><div class="post-time">${new Date(postData.createdAt?.toDate?.()||postData.createdAt).toLocaleString()}</div></div></div><div class="post-text">${escapeHtml(postData.text)}</div>${postData.imageUrl?`<img class="post-image" src="${postData.imageUrl}" alt="">`:''}</div><div class="comments-section"><div class="comment-input-area"><input type="text" id="commentInput" class="comment-input" placeholder="Write a comment..."><button id="postCommentBtn" class="comment-btn">Post</button></div><div id="commentsList"></div></div>`; renderComments(); document.getElementById('postCommentBtn').addEventListener('click',postComment); document.getElementById('commentInput').addEventListener('keypress',(e)=>{ if(e.key==='Enter') postComment(); }); }
    function renderComments(){ const comments=postData.comments||[]; const container=document.getElementById('commentsList'); if(!comments.length){ container.innerHTML='<div style="text-align:center; color:#8e8e8e; padding:20px;">No comments yet. Be the first!</div>'; return; } container.innerHTML=comments.map(c=>`<div class="comment-item"><img class="comment-avatar" src="${c.avatar||'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=32'}" alt=""><div style="flex:1"><div class="comment-user">@${escapeHtml(c.username)}</div><div class="comment-text">${escapeHtml(c.text)}</div><div style="font-size:0.65rem; color:#8e8e8e;">${new Date(c.timestamp?.toDate?.()||c.timestamp).toLocaleString()}</div></div></div>`).join(''); }
    async function postComment(){ const input=document.getElementById('commentInput'); const text=input.value.trim(); if(!text) return; const comment={ username:currentUsername, text:text, avatar:currentUser.profileImage, timestamp:new Date() }; await updateDoc(doc(db,"news",postId),{ comments:arrayUnion(comment) }); await addLog('comment',currentUsername,postData.authorUsername,`${currentUsername} commented on ${postData.authorUsername}'s post`); input.value=''; const refreshed=await getDoc(doc(db,"news",postId)); postData={id:refreshed.id,...refreshed.data()}; renderComments(); showNotification("Comment posted!"); }
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
    document.getElementById('backBtn').addEventListener('click',()=>window.location.href="home.html");
    (function antiScreenshot(){ const blackFlash=()=>{ const o=document.createElement('div'); o.style.position='fixed'; o.style.top=o.style.left='0'; o.style.width=o.style.height='100%'; o.style.backgroundColor='#000'; o.style.zIndex='999999'; document.body.appendChild(o); setTimeout(()=>o.remove(),200); }; document.addEventListener('keyup',e=>{ if(e.key==='PrintScreen'){ blackFlash(); e.preventDefault(); } }); document.addEventListener('contextmenu',e=>{ e.preventDefault(); blackFlash(); }); })();
    function handleResize(){ const blocker=document.getElementById('pcBlocker'); const app=document.getElementById('appRoot'); if(window.innerWidth>768){ blocker.style.display='flex'; if(app) app.style.display='none'; }else{ blocker.style.display='none'; if(app) app.style.display='block'; } }
    window.addEventListener('resize',handleResize); handleResize();
    loadData();
</script>
</body>
</html>
