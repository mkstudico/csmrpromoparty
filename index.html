<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Galagram • Home</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA3gohTf1rzOYBBQCI-WD8ORoTK4DOf-fw",
            authDomain: "akademia-c56ff.firebaseapp.com",
            databaseURL: "https://akademia-c56ff-default-rtdb.firebaseio.com",
            projectId: "akademia-c56ff",
            storageBucket: "akademia-c56ff.firebasestorage.app",
            messagingSenderId: "678278775270",
            appId: "1:678278775270:web:ed5aee3d358d613c8cd627",
            measurementId: "G-X3CHCJE5LK"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .pc-blocker {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 9999;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .pc-blocker i {
            font-size: 4rem;
            margin-bottom: 1.2rem;
            color: #d62976;
        }
        .app-container {
            display: block;
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
        }
        .header {
            background: #ffffff;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 0.5px solid #efefef;
            position: sticky;
            top: 0;
            z-index: 10;
            background: #fff;
        }
        .logo {
            font-weight: 620;
            font-size: 1.7rem;
            background: linear-gradient(135deg, #f77737, #d62976, #962fbf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .page {
            padding: 24px 18px;
            background: #fafafa;
            min-height: 85vh;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px 18px;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .home-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .story-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d62976;
            padding: 2px;
        }
        .promo-card {
            background: #ffffff;
            border-radius: 16px;
            border: 0.5px solid #efefef;
            margin-top: 20px;
            padding: 16px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: #0095f6;
            color: white;
            font-weight: 600;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-outline {
            background: #efefef;
            color: #262626;
        }
        footer {
            text-align: center;
            font-size: 0.65rem;
            padding: 20px;
            color: #a0a0a0;
            border-top: 0.5px solid #efefef;
        }
        .galagram-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.25s;
            pointer-events: none;
        }
        .galagram-toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .hidden {
            display: none;
        }
        i.bx {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

<div id="pcBlocker" class="pc-blocker">
    <i class='bx bx-mobile-alt'></i>
    <p>Use your phone — PC is not supported</p>
</div>

<div id="appRoot" class="app-container">
    <div class="header">
        <div class="logo">Galagram<span>.</span></div>
        <div class="header-icons">
            <i class='bx bx-heart'></i>
            <i class='bx bx-message-dots'></i>
        </div>
    </div>

    <div id="homePage" class="page">
        <div class="card">
            <div class="home-header">
                <img id="homeProfileImg" class="story-ring" src="https://ui-avatars.com/api/?background=262626&color=fff&rounded=true&size=60" alt="profile">
                <div>
                    <strong id="homeUsername" style="font-size: 1rem;">@user</strong>
                    <div id="homeRealName" style="font-size: 0.75rem; color: #6e6e6e;"></div>
                </div>
            </div>
            <div class="promo-card">
                <div class="flex-between">
                    <span><i class='bx bxs-party' style="color:#d62976;"></i> <strong>Promo night</strong></span>
                    <span id="displayUserCode" style="font-family: monospace; background:#f2f2f2; padding:4px 12px; border-radius:30px; font-size:0.75rem;">XXXXXX</span>
                </div>
                <p style="margin-top: 14px; font-size: 0.9rem;">🎉 Welcome to Galagram! School party is live. Share your unique code to invite friends.</p>
                <div style="margin-top: 18px; display: flex; gap: 12px;">
                    <i class='bx bx-camera'></i>
                    <i class='bx bx-music'></i>
                    <i class='bx bx-map'></i>
                </div>
            </div>
            <button id="logoutBtn" class="btn btn-outline"><i class='bx bx-log-out'></i> Log out</button>
        </div>
        <footer>Galagram ✦ school spirit</footer>
    </div>
</div>

<script type="module">
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const db = window.db;
    
    function showNotification(message, type = "info") {
        const existingToast = document.querySelector('.galagram-toast');
        if(existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = `galagram-toast ${type}`;
        toast.innerHTML = `<i class='bx ${type === 'error' ? 'bx-error-circle' : 'bx-check-circle'}'></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 6000);
    }
    
    // Check session
    const sessionData = localStorage.getItem('galagram_session');
    if (!sessionData) {
        window.location.href = "index.html";
    }
    
    const session = JSON.parse(sessionData);
    const username = session.username;
    const sessionId = session.sessionId;
    
    // Real-time session tracking
    const userRef = doc(db, "users", username);
    const unsubscribe = onSnapshot(userRef, (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.activeSession && data.activeSession !== sessionId) {
                showNotification('⚠️ Someone else logged into your account. You will be logged out.', 'error');
                setTimeout(() => {
                    localStorage.removeItem('galagram_session');
                    window.location.href = "index.html";
                }, 2000);
            }
        }
    });
    
    // Load user data
    const userData = session.userData;
    document.getElementById('homeProfileImg').src = userData.profileImage || "https://ui-avatars.com/api/?background=262626&color=fff&rounded=true&size=60";
    document.getElementById('homeUsername').innerHTML = `@${userData.username}`;
    document.getElementById('homeRealName').innerHTML = userData.realName;
    document.getElementById('displayUserCode').innerText = userData.sixDigitCode;
    
    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await updateDoc(userRef, { activeSession: null, lastActive: null }).catch(() => {});
        localStorage.removeItem('galagram_session');
        unsubscribe();
        window.location.href = "index.html";
    });
    
    // Screenshot Protection
    (function antiScreenshot() {
        const blackFlash = () => {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = overlay.style.left = '0';
            overlay.style.width = overlay.style.height = '100%';
            overlay.style.backgroundColor = '#000000';
            overlay.style.zIndex = '999999';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 200);
        };
        document.addEventListener('keyup', (e) => { if(e.key === 'PrintScreen') { blackFlash(); e.preventDefault(); } });
        document.addEventListener('keydown', (e) => { if(e.key === 'PrintScreen') { blackFlash(); e.preventDefault(); } });
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); blackFlash(); });
    })();
    
    function handleResize() {
        const blocker = document.getElementById('pcBlocker');
        const app = document.getElementById('appRoot');
        if(window.innerWidth > 768) {
            blocker.style.display = 'flex';
            if(app) app.style.display = 'none';
        } else {
            blocker.style.display = 'none';
            if(app) app.style.display = 'block';
        }
    }
    window.addEventListener('resize', handleResize);
    handleResize();
</script>
</body>
</html>
