<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Galagram • Sign In</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Galagram">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA3gohTf1rzOYBBQCI-WD8ORoTK4DOf-fw",
            authDomain: "akademia-c56ff.firebaseapp.com",
            databaseURL: "https://akademia-c56ff-default-rtdb.firebaseio.com",
            projectId: "akademia-c56ff",
            storageBucket: "akademia-c56ff.firebasestorage.app",
            messagingSenderId: "678278775270",
            appId: "1:678278775270:web:ed5aee3d358d613c8cd627",
            measurementId: "G-X3CHCJE5LK"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .pc-blocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .pc-blocker i { font-size: 4rem; margin-bottom: 1.2rem; color: #d62976; }
        .app-container { display: block; max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; }
        .header { background: #ffffff; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #efefef; }
        .logo { font-weight: 620; font-size: 1.7rem; background: linear-gradient(135deg, #f77737, #d62976, #962fbf); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .page { padding: 24px 18px; background: #ffffff; min-height: 85vh; }
        .card { background: #ffffff; border-radius: 12px; padding: 20px 18px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
        .form-group { margin-bottom: 18px; }
        label { font-size: 0.7rem; font-weight: 600; color: #8e8e8e; text-transform: uppercase; display: block; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px 14px; border: 1px solid #dbdbdb; border-radius: 8px; font-size: 0.95rem; background: #fafafa; }
        .btn { background: #0095f6; color: white; font-weight: 600; border: none; padding: 12px; width: 100%; border-radius: 10px; font-size: 0.95rem; cursor: pointer; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-outline { background: transparent; border: 1px solid #0095f6; color: #0095f6; margin-top: 8px; }
        .switch-link { text-align: center; margin-top: 20px; color: #00376b; font-weight: 500; font-size: 0.85rem; cursor: pointer; }
        .small-note { font-size: 0.65rem; color: #8e8e8e; margin-top: 5px; }
        .protection-card { background: #f8f8f8; border-radius: 10px; padding: 12px 14px; margin: 14px 0 10px; border: 0.5px solid #efefef; }
        .inline-check { display: flex; align-items: center; gap: 10px; }
        .hidden { display: none; }
        footer { text-align: center; font-size: 0.65rem; padding: 20px; color: #a0a0a0; border-top: 0.5px solid #efefef; }
        .profile-preview-circle { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; border: 1.5px solid #dbdbdb; }
        .img-upload-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .upload-btn-mini { background: #efefef; padding: 8px 20px; border-radius: 30px; font-size: 0.75rem; font-weight: 500; cursor: pointer; }
        #profileImageInput { display: none; }
        .loader-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .galagram-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); color: white; padding: 12px 20px; border-radius: 40px; font-size: 0.85rem; z-index: 10000; transition: transform 0.25s; pointer-events: none; }
        .galagram-toast.show { transform: translateX(-50%) translateY(0); }
        .recent-codes { margin-top: 16px; }
        .recent-title { font-size: 0.75rem; font-weight: 600; color: #8e8e8e; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .codes-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .code-chip { background: #efefef; padding: 6px 12px; border-radius: 30px; font-size: 0.8rem; font-family: monospace; font-weight: 600; cursor: pointer; }
        .clear-history { font-size: 0.7rem; color: #ed4956; cursor: pointer; }
    </style>
</head>
<body>
<div id="pcBlocker" class="pc-blocker"><i class='bx bx-mobile-alt'></i><p>Use your phone — PC is not supported</p></div>
<div id="appRoot" class="app-container">
    <div class="header"><div class="logo">Galagram<span>.</span></div><div class="header-icons"><i class='bx bx-heart'></i><i class='bx bx-message-dots'></i></div></div>
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="page">
        <div class="card">
            <h3 style="margin-bottom:20px;">🎟️ Welcome back</h3>
            <div class="form-group"><label>6‑digit identifier</label><input type="text" id="loginCode" placeholder="e.g., 482719" maxlength="6" inputmode="numeric"></div>
            <div id="dynamicPasswordField" class="hidden" style="margin-top:6px;"><input type="password" id="loginPassword" placeholder="Additional password"></div>
            <button id="loginBtn" class="btn"><i class='bx bx-log-in-circle'></i> Log in</button>
            <div class="recent-codes"><div class="recent-title"><span>📱 Your recent accounts</span><span class="clear-history" id="clearHistoryBtn">Clear all</span></div><div class="codes-list" id="codesList"></div></div>
            <button id="pwaInstallBtn" class="btn btn-outline hidden"><i class='bx bx-download'></i> Install App</button>
            <div class="switch-link" id="goToSignup">No account? <strong>Create one</strong></div>
        </div>
        <footer>Galagram · exclusive promo party</footer>
    </div>
    <!-- SIGNUP PAGE -->
    <div id="signupPage" class="page hidden">
        <div class="card">
            <h3 style="margin-bottom:12px;">✨ Join the party</h3>
            <div class="img-upload-area"><img id="profilePreview" class="profile-preview-circle" src="https://ui-avatars.com/api/?background=0D8F81&color=fff&rounded=true&size=80&bold=true&name=📸"><label for="profileImageInput" class="upload-btn-mini"><i class='bx bx-cloud-upload'></i> Upload profile</label><input type="file" id="profileImageInput" accept="image/jpeg,image/png,image/jpg"></div>
            <div class="form-group"><label>Real name</label><input type="text" id="realName" placeholder="Alex Morgan"></div>
            <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="alex_promo"></div>
            <div class="form-group"><label>Gender</label><select id="gender"><option value="Null">Select</option><option value="BOY">BOY</option><option value="GIRL">GIRL</option></select></div>
            <div class="form-group"><label>Phone number</label><input type="tel" id="phone" placeholder="+250 78 123 4567"><div class="small-note">Your contact (any format)</div></div>
            <div class="form-group"><label>Instagram name (optional)</label><input type="text" id="instagramName" placeholder="@alex123"></div>
            <div class="protection-card"><div class="inline-check"><input type="checkbox" id="extraProtectionToggle"><label><i class='bx bx-shield-alt-2'></i> Add password protection</label></div><div id="passwordFieldContainer" class="hidden" style="margin-top:12px;"><input type="password" id="extraPassword" placeholder="Create strong password"></div></div>
            <button id="signupBtn" class="btn"><i class='bx bx-user-plus'></i> Sign up → Get code</button>
            <div class="switch-link" id="goToLoginFromSignup">Already have an account? <strong>Log in</strong></div>
        </div>
    </div>
</div>
<script type="module">
    import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const db = window.db;
    const IMGBB_KEY = "99c6aa298645e8a4742979117fc73be6";
    
    let deferredPrompt = null;
    const pwaInstallBtn = document.getElementById('pwaInstallBtn');
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; if (!window.matchMedia('(display-mode: standalone)').matches) pwaInstallBtn.classList.remove('hidden'); });
    pwaInstallBtn.addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; console.log(outcome); deferredPrompt = null; pwaInstallBtn.classList.add('hidden'); } else showNotification('Your browser does not support automatic installation.', 'info'); });
    
    function showNotification(msg, type='info') { const existing=document.querySelector('.galagram-toast'); if(existing) existing.remove(); const toast=document.createElement('div'); toast.className=`galagram-toast ${type}`; toast.innerHTML=`<i class='bx ${type==='success'?'bx-check-circle':type==='error'?'bx-error-circle':'bx-info-circle'}'></i><span>${msg}</span>`; document.body.appendChild(toast); setTimeout(()=>toast.classList.add('show'),10); setTimeout(()=>{toast.classList.remove('show'); setTimeout(()=>toast.remove(),300);},4000); }
    function setLoading(btn, loading, orig) { if(loading) { btn.disabled=true; btn.innerHTML=`<span class="loader-spinner"></span> ${orig||'Processing...'}`; } else { btn.disabled=false; btn.innerHTML=orig||btn.getAttribute('data-original-text')||'Submit'; } }
    async function uploadToImgBB(file) { const fd=new FormData(); fd.append('image',file); const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{method:'POST',body:fd}); const data=await res.json(); if(data.success) return data.data.url; throw new Error('Upload failed'); }
    let uploadedImageURL=null;
    document.getElementById('profileImageInput').addEventListener('change', async(e)=>{ const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=ev=>{ document.getElementById('profilePreview').src=ev.target.result; }; reader.readAsDataURL(file); const label=document.querySelector('.upload-btn-mini'); const orig=label.innerHTML; label.innerHTML='<i class="bx bx-loader-alt bx-spin"></i> Uploading...'; try{ uploadedImageURL=await uploadToImgBB(file); showNotification('Profile photo uploaded!','success'); }catch(err){ uploadedImageURL=null; showNotification('Upload failed','error'); }finally{ label.innerHTML=orig; } } });
    function generateSixDigit(){ return Math.floor(100000+Math.random()*900000).toString(); }
    async function createAndRedirectSession(username, sixDigitCode, userData) {
        const session = { username, sixDigitCode, userData: { realName: userData.realName, username: userData.username, profileImage: userData.profileImage, sixDigitCode, gender: userData.gender, phoneNumber: userData.phoneNumber, instagramName: userData.instagramName||"" } };
        localStorage.setItem('galagram_session', JSON.stringify(session));
        addCodeToHistory(sixDigitCode, username);
        window.location.href = "home.html";
    }
    const HISTORY_KEY='galagram_codes_history';
    function getCodeHistory(){ const stored=localStorage.getItem(HISTORY_KEY); return stored?JSON.parse(stored):[]; }
    function saveCodeHistory(hist){ localStorage.setItem(HISTORY_KEY,JSON.stringify(hist)); }
    function addCodeToHistory(code, username){ let hist=getCodeHistory(); hist=hist.filter(entry=>entry.code!==code); hist.unshift({code,username,timestamp:new Date().toISOString()}); if(hist.length>20) hist.pop(); saveCodeHistory(hist); renderRecentCodes(); }
    function clearCodeHistory(){ saveCodeHistory([]); renderRecentCodes(); showNotification('History cleared','success'); }
    function renderRecentCodes(){ const container=document.getElementById('codesList'); const hist=getCodeHistory(); if(!hist.length){ container.innerHTML='<div style="font-size:0.7rem; color:#aaa; padding:6px 0;">No saved accounts yet.</div>'; return; }
        container.innerHTML=hist.map(entry=>`<div class="code-chip" data-code="${entry.code}" data-username="${escapeHtml(entry.username)}">${entry.code} <span style="font-size:0.65rem;">(${escapeHtml(entry.username)})</span></div>`).join('');
        document.querySelectorAll('.code-chip').forEach(chip=>{ chip.addEventListener('click',()=>{ const code=chip.dataset.code; document.getElementById('loginCode').value=code; const event=new Event('input',{bubbles:true}); document.getElementById('loginCode').dispatchEvent(event); showNotification(`Code ${code} filled`,'success'); }); });
    }
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
    document.getElementById('signupBtn').addEventListener('click', async()=>{ const realName=document.getElementById('realName').value.trim(), username=document.getElementById('username').value.trim(), gender=document.getElementById('gender').value, phone=document.getElementById('phone').value.trim(), instaName=document.getElementById('instagramName').value.trim(), extraProtect=document.getElementById('extraProtectionToggle').checked, password=document.getElementById('extraPassword').value;
        if(!realName||!username||!phone){ showNotification('Real name, username & phone are required','error'); return; }
        if(gender==="Null"){ showNotification('Please select a gender','error'); return; }
        if(extraProtect && password.length<4){ showNotification('Password must be at least 4 characters','error'); return; }
        setLoading(signupBtn, true, 'Creating account...');
        try{
            const usersRef=collection(db,"users"); const q=query(usersRef,where("username","==",username)); const snap=await getDocs(q);
            if(!snap.empty){ showNotification('Username already taken','error'); setLoading(signupBtn,false,'Sign up → Get code'); return; }
            const sixCode=generateSixDigit();
            const profilePic=uploadedImageURL||`https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80&name=${username.charAt(0).toUpperCase()}`;
            const userData={ realName, username, gender, phoneNumber:phone, instagramName:instaName||"", sixDigitCode:sixCode, hasPassword:extraProtect, password:extraProtect?password:null, profileImage:profilePic, createdAt:new Date().toISOString(), galaStatus:"available", requests:[], sentRequests:[] };
            await setDoc(doc(db,"users",username),userData);
            showNotification('✅ Account created! Logging you in...','success');
            await createAndRedirectSession(username,sixCode,userData);
        }catch(e){ showNotification('Error: '+e.message,'error'); setLoading(signupBtn,false,'Sign up → Get code'); }
    });
    const loginCodeInput=document.getElementById('loginCode'), dynamicPassDiv=document.getElementById('dynamicPasswordField'), loginPasswordInput=document.getElementById('loginPassword');
    let currentLoginUserDoc=null;
    async function checkCodeAndUpdatePasswordField(){ const code=loginCodeInput.value.trim(); if(code.length!==6){ dynamicPassDiv.classList.add('hidden'); currentLoginUserDoc=null; return; }
        const usersRef=collection(db,"users"); const q=query(usersRef,where("sixDigitCode","==",code)); const snap=await getDocs(q);
        if(!snap.empty){ const user=snap.docs[0].data(); if(user.hasPassword===true){ dynamicPassDiv.classList.remove('hidden'); currentLoginUserDoc=snap.docs[0]; }else{ dynamicPassDiv.classList.add('hidden'); currentLoginUserDoc=snap.docs[0]; } }else{ dynamicPassDiv.classList.add('hidden'); currentLoginUserDoc=null; }
    }
    loginCodeInput.addEventListener('input',checkCodeAndUpdatePasswordField);
    document.getElementById('loginBtn').addEventListener('click', async()=>{ const code=loginCodeInput.value.trim(); if(code.length!==6){ showNotification('Enter valid 6-digit code','error'); return; }
        setLoading(loginBtn,true,'Signing in...');
        try{
            const usersRef=collection(db,"users"); const q=query(usersRef,where("sixDigitCode","==",code)); const snap=await getDocs(q);
            if(snap.empty){ showNotification('No account found with this code','error'); setLoading(loginBtn,false,'Log in'); return; }
            const userDoc=snap.docs[0], user=userDoc.data();
            if(user.hasPassword){ const providedPass=loginPasswordInput.value; if(!providedPass || providedPass!==user.password){ showNotification('Incorrect password','error'); setLoading(loginBtn,false,'Log in'); return; } }
            addCodeToHistory(code,userDoc.id);
            await createAndRedirectSession(userDoc.id,code,user);
        }catch(e){ showNotification('Login error: '+e.message,'error'); setLoading(loginBtn,false,'Log in'); }
    });
    document.getElementById('goToSignup').addEventListener('click',()=>{ document.getElementById('loginPage').classList.add('hidden'); document.getElementById('signupPage').classList.remove('hidden'); loginCodeInput.value=''; loginPasswordInput.value=''; });
    document.getElementById('goToLoginFromSignup').addEventListener('click',()=>{ document.getElementById('signupPage').classList.add('hidden'); document.getElementById('loginPage').classList.remove('hidden'); });
    document.getElementById('extraProtectionToggle').addEventListener('change',(e)=>{ const container=document.getElementById('passwordFieldContainer'); if(e.target.checked) container.classList.remove('hidden'); else{ container.classList.add('hidden'); document.getElementById('extraPassword').value=''; } });
    document.getElementById('clearHistoryBtn').addEventListener('click',()=>{ if(confirm('Clear all saved account codes?')) clearCodeHistory(); });
    (function antiScreenshot(){ const blackFlash=()=>{ const o=document.createElement('div'); o.style.position='fixed'; o.style.top=o.style.left='0'; o.style.width=o.style.height='100%'; o.style.backgroundColor='#000'; o.style.zIndex='999999'; document.body.appendChild(o); setTimeout(()=>o.remove(),200); }; document.addEventListener('keyup',e=>{ if(e.key==='PrintScreen'){ blackFlash(); e.preventDefault(); navigator.clipboard.writeText(''); } }); document.addEventListener('contextmenu',e=>{ e.preventDefault(); blackFlash(); }); })();
    function handleResize(){ const blocker=document.getElementById('pcBlocker'); const app=document.getElementById('appRoot'); if(window.innerWidth>768){ blocker.style.display='flex'; if(app) app.style.display='none'; }else{ blocker.style.display='none'; if(app) app.style.display='block'; } }
    window.addEventListener('resize',handleResize); handleResize();
    if(localStorage.getItem('galagram_session')) window.location.href="home.html";
    renderRecentCodes();
</script>
</body>
</html>
