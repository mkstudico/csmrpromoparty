<body>
<div id="pcBlocker" class="pc-blocker"><i class='bx bx-mobile-alt'></i><p>Use your phone — PC is not supported</p></div>
<div id="appRoot" class="app-container">
    <div class="header">
        <div class="logo">Galagram</div>
        <div class="header-right">
            <div class="heart-icon" id="requestsHeart"><i class='bx bx-heart' style="font-size:1.6rem;"></i><span id="requestBadge" class="heart-badge hidden">0</span></div>
            <img id="profileAvatar" class="profile-icon" src="" alt="profile">
        </div>
    </div>
    <div class="search-bar" id="searchBar">
        <input type="text" id="searchInput" class="search-input" placeholder="Search by username...">
        <div id="searchSuggestions" class="search-suggestions"></div>
    </div>
    <div class="content" id="contentArea"><div class="loading-spinner"><i class='bx bx-loader-alt bx-spin'></i> Loading...</div></div>

    <!-- Bottom Navigation Bar -->

        <div class="nav-item" data-nav="posts"><i class='bx bx-news'></i><span>Posts</span></div>
        <div class="nav-item" data-nav="all"><i class='bx bx-group'></i><span>All</span></div>
        <div class="nav-item" data-nav="available"><i class='bx bx-star'></i><span>Available</span></div>
        <div class="nav-item" data-nav="movies"><i class='bx bx-movie'></i><span>Hub</span></div>
        <div class="nav-item" data-nav="chat"><i class='bx bx-chat'></i><span>Chat</span></div>
    </div>
</div>

<script type="module">
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, onSnapshot, arrayUnion, arrayRemove, orderBy, addDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-messaging.js";
    
    const db = window.db;
    const messaging = getMessaging();
    const IMGBB_KEY = "99c6aa298645e8a4742979117fc73be6";
    
    let currentUser = null, allUsers = [], allPosts = [], requestsList = [], currentNav = "posts", searchQuery = "", searchDebounceTimer = null, unsubscribeUsers = null;
    let postingType = "text";
    let selectedImageFiles = [];
    let imagePreviewUrls = [];
    let currentQuestion = "What are you planning to wear in the party?"; // default, will be fetched from Firestore
    let carouselInterval = null;
    let currentSlideIndex = 0;
    
    // ---------- Helper functions ----------
    async function addLog(type, actor, target, message) { try { await addDoc(collection(db,"logs"),{type,actor,target,message,timestamp:new Date()}); } catch(e){} }
    function showNotificationMessage(message, type = "info") { 
        const existing = document.querySelector('.galagram-toast'); 
        if(existing) existing.remove(); 
        const toast = document.createElement('div'); 
        toast.className = `galagram-toast`; 
        toast.innerHTML = `<i class='bx ${type === 'error' ? 'bx-error-circle' : 'bx-check-circle'}'></i><span>${message}</span>`; 
        document.body.appendChild(toast); 
        setTimeout(() => toast.classList.add('show'), 10); 
        setTimeout(() => toast.remove(), 4000); 
    }
    
    const sessionData = localStorage.getItem('galagram_session'); 
    if (!sessionData) { window.location.href = "index.html"; } 
    const session = JSON.parse(sessionData); 
    const currentUsername = session.username;
    
    // ---------- Fetch current question from Firestore ----------
    async function fetchCurrentQuestion() {
        try {
            const configDoc = await getDoc(doc(db, "party", "config"));
            if (configDoc.exists() && configDoc.data().postQuestion) {
                currentQuestion = configDoc.data().postQuestion;
            }
        } catch(e) { console.error("Error fetching question:", e); }
    }
    
    // ---------- Silent FCM (no modals) ----------
    async function initFCM() {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                try {
                    const token = await getToken(messaging, { vapidKey: "BB1VSO5Rh0IlR3dZj26fgKo0sLj1IR0rJTgyxtSwzs5P9_0myLEekbmlNO3vjU_UMCiLQLvIXUlZMwAvxCzoKf4" });
                    if (token) {
                        await updateDoc(doc(db, "users", currentUsername), { fcmToken: token });
                        console.log("FCM token stored");
                    }
                } catch (swError) {
                    console.error("Service worker registration failed:", swError);
                }
            }
        } catch (err) {
            console.error("FCM init error", err);
        }
    }
    
    onMessage(messaging, (payload) => {
        const { title, body } = payload.notification;
        new Notification(title, { body, icon: "/icon-192.png" });
    });
    
    // ---------- Load current user ----------
    async function loadCurrentUser() { 
        const userDoc = await getDoc(doc(db, "users", currentUsername)); 
        if (userDoc.exists()) { 
            currentUser = { id: currentUsername, ...userDoc.data() }; 
            if (!currentUser.galaStatus) await updateDoc(doc(db, "users", currentUsername), { galaStatus: "available", requests: [], sentRequests: [] }); 
            if (!currentUser.requests) await updateDoc(doc(db, "users", currentUsername), { requests: [] }); 
            if (!currentUser.sentRequests) await updateDoc(doc(db, "users", currentUsername), { sentRequests: [] }); 
            if (!currentUser.verified) await updateDoc(doc(db, "users", currentUsername), { verified: "none" }); 
            requestsList = currentUser.requests || []; 
            updateRequestBadge(); 
            document.getElementById('profileAvatar').src = currentUser.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'; 
            if (!currentUser.survey) showSurvey(); 
            await initFCM();
            await checkPendingNotifiers();
            await checkVerificationPrompt();
        } 
    }
    
    // ---------- Survey (unchanged) ----------
    function showSurvey() {
        if (currentUser.survey) return;
        const overlay = document.createElement('div');
        overlay.className = 'survey-overlay';
        overlay.innerHTML = `<div class="survey-container"><div class="survey-title">🎉 Complete your profile</div><div id="surveySteps"></div><div class="survey-progress"><div class="survey-progress-bar" id="surveyProgress"></div></div><div class="survey-buttons"><button id="surveyPrev" class="survey-btn survey-btn-secondary" disabled>Back</button><button id="surveyNext" class="survey-btn survey-btn-primary">Next</button></div></div>`;
        document.body.appendChild(overlay);
        const questions = [
            { key: "district", label: "Which district are you from?", type: "select", options: ["Kigali", "Rubavu", "Musanze", "Huye", "Muhanga", "Rusizi", "Other"] },
            { key: "ageRange", label: "Age range", type: "select", options: ["18-22", "23-27", "28-32", "33+"] },
            { key: "height", label: "Height", type: "select", options: ["Tall (180cm+)", "Medium (165-179cm)", "Short (<165cm)"] },
            { key: "hobby", label: "Favorite hobby", type: "select", options: ["Music", "Sports", "Art", "Travel", "Reading", "Gaming"] },
            { key: "classCombo", label: "Class combo", type: "select", options: ["Science", "Arts", "Business", "Not specified"] },
            { key: "everKissed", label: "Ever kissed?", type: "select", options: ["Yes", "No", "Prefer not to say"] }
        ];
        let step = 0;
        const answers = {};
        function renderStep() {
            const container = document.getElementById('surveySteps');
            const q = questions[step];
            let html = `<div class="survey-question"><div class="survey-label">${q.label}</div>`;
            if (q.type === "select") {
                html += `<select id="surveyValue" class="survey-select">${q.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}</select>`;
            } else {
                html += `<input type="text" id="surveyValue" class="survey-input" placeholder="${q.label}">`;
            }
            html += `</div>`;
            container.innerHTML = html;
            if (answers[q.key]) document.getElementById('surveyValue').value = answers[q.key];
            document.getElementById('surveyPrev').disabled = step === 0;
            const progress = ((step + 1) / questions.length) * 100;
            document.getElementById('surveyProgress').style.width = `${progress}%`;
        }
        document.getElementById('surveyNext').onclick = () => {
            const val = document.getElementById('surveyValue').value;
            if (!val) { showNotificationMessage("Please select an option", "error"); return; }
            answers[questions[step].key] = val;
            if (step + 1 < questions.length) { step++; renderStep(); }
            else {
                updateDoc(doc(db, "users", currentUsername), { survey: answers }).then(() => {
                    currentUser.survey = answers;
                    showNotificationMessage("Survey completed! Better matches now.", "success");
                    overlay.remove();
                }).catch(() => showNotificationMessage("Error saving survey", "error"));
            }
        };
        document.getElementById('surveyPrev').onclick = () => { if (step > 0) { step--; renderStep(); } };
        renderStep();
    }
    
    // ---------- Pending Notifiers (admin messages) ----------
    async function checkPendingNotifiers() {
        if (!currentUser) return;
        const notifiersRef = collection(db, "notifiers");
        const q = query(notifiersRef, where("userId", "==", currentUsername), where("completed", "==", false));
        const snapshot = await getDocs(q);
        if (snapshot.empty) return;
        for (const docSnap of snapshot.docs) {
            const notifier = { id: docSnap.id, ...docSnap.data() };
            await showNotifierModal(notifier);
            break;
        }
    }
    
    async function showNotifierModal(notifier) {
        return new Promise((resolve) => {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            const modal = document.createElement('div');
            modal.className = 'modal-container';

    // ---------- Compatibility & Suggestions ----------
    let recentSuggestions = [];
    function computeCompatibilityScore(user) { 
        if (user.id === currentUsername || user.galaStatus !== "available" || currentUser.sentRequests?.includes(user.id) || currentUser.requests?.includes(user.id) || currentUser.gender === user.gender) return -Infinity; 
        let score = 50; 
        if (currentUser.gender !== user.gender) score += 30; 
        const mySurvey = currentUser.survey, theirSurvey = user.survey; 
        if (mySurvey && theirSurvey) { 
            if (mySurvey.district === theirSurvey.district) score += 25; 
            if (mySurvey.ageRange === theirSurvey.ageRange) score += 15; 
            if (mySurvey.height === theirSurvey.height) score += 10; 
            if (mySurvey.hobby === theirSurvey.hobby) score += 30; 
            if (mySurvey.classCombo === theirSurvey.classCombo) score += 35; 
            if (mySurvey.everKissed === theirSurvey.everKissed) score += 10; 
        } 
        if (user.verified === "blue") score += 25; 
        else if (user.verified === "gray") score += 15; 
        return score; 
    }
    function getTopSuggestions(users, count = 5) { 
        return users.filter(u => u.galaStatus === "available" && u.id !== currentUsername && currentUser.gender !== u.gender).map(u => ({ user: u, score: computeCompatibilityScore(u) })).sort((a,b) => b.score - a.score).slice(0, count).map(item => item.user); 
    }
    
    // ---------- Render Users (All / Available) ----------
    function renderUsers() { 
        let filtered = [...allUsers]; 
        if (searchQuery) { const q = searchQuery.toLowerCase(); filtered = filtered.filter(u => u.username?.toLowerCase().includes(q) || u.realName?.toLowerCase().includes(q)); } 
        if (currentNav === "available") { 
            filtered = filtered.filter(u => u.galaStatus === "available" && u.gender !== currentUser.gender); 
            filtered = getTopSuggestions(filtered, filtered.length); 
        } else if (currentNav === "all") { 
            const opposite = filtered.filter(u => u.galaStatus === "available" && u.gender !== currentUser.gender); 
            const same = filtered.filter(u => u.galaStatus === "available" && u.gender === currentUser.gender); 
            const taken = filtered.filter(u => u.galaStatus === "taken"); 
            const sortedOpposite = getTopSuggestions(opposite, opposite.length); 
            filtered = [...sortedOpposite, ...same, ...taken]; 
        } 
        const container = document.getElementById('contentArea'); 
        if (!filtered.length) { container.innerHTML = `<div class="empty-state"><i class='bx bx-user-x' style="font-size: 3rem;"></i><p>No users found</p></div>`; return; }

    // Carousel for Most Popular
    let carouselPosts = [];
    let carouselAutoTimer = null;
    
    function initCarousel(posts) {
        if (carouselAutoTimer) clearInterval(carouselAutoTimer);
        carouselPosts = posts;
        if (!carouselPosts.length) return;
        currentSlideIndex = 0;
        renderCarousel();
        carouselAutoTimer = setInterval(() => {
            if (carouselPosts.length > 1) {
                currentSlideIndex = (currentSlideIndex + 1) % carouselPosts.length;
                renderCarousel();
            }
        }, 5000);
    }
    
    function renderCarousel() {
        const container = document.getElementById('carouselContainer');
        if (!container || !carouselPosts.length) return;
        const post = carouselPosts[currentSlideIndex];
        const isImage = post.type === 'image' || (post.imageUrls && post.imageUrls.length > 0);
        const imageUrl = isImage ? (post.imageUrls?.[0] || post.imageUrl || '') : '';
        const content = isImage ? '' : (post.text || '');
        const likes = post.likes?.length || 0;
        const comments = post.comments?.length || 0;
        const verifiedIcon = getVerifiedIcon(post.authorVerified);
        container.innerHTML = `
            <div class="carousel-item" data-postid="${post.id}">
                ${isImage ? `<img src="${imageUrl}" alt="post">` : `<div class="carousel-text">${escapeHtml(content)}</div>`}
                <div class="carousel-author">
                    <img src="${post.authorAvatar || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=32'}" alt="">
                    <span>${escapeHtml(post.authorName)}</span>
                    ${verifiedIcon}
                </div>
                <div style="font-size:0.7rem; color:#8e8e8e; margin-top:4px;">❤️ ${likes} 💬 ${comments}</div>
            </div>
        `;
        // attach click event
        const item = container.querySelector('.carousel-item');
        if (item) item.addEventListener('click', () => window.location.href = `news.html?id=${post.id}`);
        // update dots
        const dotsContainer = document.getElementById('carouselDots');
        if (dotsContainer) {
            dotsContainer.innerHTML = carouselPosts.map((_, idx) => `<span class="dot ${idx === currentSlideIndex ? 'active' : ''}" data-index="${idx}"></span>`).join('');
            document.querySelectorAll('.dot').forEach(dot => {
                dot.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    if (!isNaN(idx)) {
                        currentSlideIndex = idx;
                        renderCarousel();
                        // reset timer
                        if (carouselAutoTimer) {
                            clearInterval(carouselAutoTimer);
                            carouselAutoTimer = setInterval(() => {
                                if (carouselPosts.length > 1) {
                                    currentSlideIndex = (currentSlideIndex + 1) % carouselPosts.length;
                                    renderCarousel();
                                }
                            }, 5000);
                        }
                    }
                });
            });
        }
    }
    
    function renderDiscoverySections(posts) {
        const sortedByLikes = [...posts].sort((a,b) => (b.likes?.length || 0) - (a.likes?.length || 0));
        const mostPopular = sortedByLikes.slice(0, 15);
        const mostPopularIds = new Set(mostPopular.map(p => p.id));
        const textPosts = posts.filter(p => p.type === 'text' || (!p.imageUrls && p.text)).filter(p => !mostPopularIds.has(p.id));
        const imagePosts = posts.filter(p => p.type === 'image' || (p.imageUrls && p.imageUrls.length > 0)).filter(p => !mostPopularIds.has(p.id));
        
        let html = '';
        
        // Most Popular Carousel (🔥)
        if (mostPopular.length) {
            html += `<div class="section-title">🔥</div>
                     <div class="carousel-container">
                         <div id="carouselContainer" class="carousel-slide"></div>
                         <div id="carouselDots" class="carousel-dots"></div>
                     </div>`;
            // initialize carousel after DOM is ready
            setTimeout(() => initCarousel(mostPopular), 0);
        }
        
        // All Text Posts Section
        if (textPosts.length) {
            html += `<div class="section-title">📄 All Text Posts</div>
                     <div class="horizontal-scroll" id="textScroll">${renderDiscoveryCards(textPosts)}</div>`;
        }
        
        // All Image Posts Section (Grid)
        if (imagePosts.length) {
            html += `<div class="section-title">🖼️ All Image Posts</div>
                     <div class="image-grid" id="imageGrid">${renderImageGrid(imagePosts)}</div>`;
        }
        
        if (mostPopular.length === 0 && textPosts.length === 0 && imagePosts.length === 0) {
            html += `<div class="empty-state">No posts yet. Be the first to post!</div>`;
        }
        
        return html;
    }
    
    function renderDiscoveryCards(posts) {
        return posts.map(post => {
            const imageUrl = post.imageUrls?.[0] || post.imageUrl || 'https://via.placeholder.com/140';
            const title = post.type === 'image' ? (post.description || 'Image post') : (post.text?.substring(0, 40) || 'Post');
            const likes = post.likes?.length || 0;
            return `<div class="discovery-card" data-postid="${post.id}"><img src="${imageUrl}" alt="post"><div class="content"><div class="title">${escapeHtml(title)}</div><div class="stats">❤️ ${likes} likes</div></div></div>`;
        }).join('');
    }
    
    function renderImageGrid(posts) {
        return posts.map(post => {
            const imageUrl = post.imageUrls?.[0] || post.imageUrl;
            const likes = post.likes?.length || 0;
            const comments = post.comments?.length || 0;
            return `<div class="grid-item" data-postid="${post.id}"><img src="${imageUrl}" alt="post"><div class="grid-overlay"><span><i class='bx bx-heart'></i> ${likes}</span><span><i class='bx bx-comment'></i> ${comments}</span></div></div>`;

                    if (selectedImageFiles.length + files.length > 10) {
                        showNotificationMessage("Max 10 images allowed", "error");
                        return;
                    }
                    for (const file of files) {
                        if (!file.type.startsWith('image/')) continue;
                        selectedImageFiles.push(file);
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            imagePreviewUrls.push(ev.target.result);
                            renderImagePreviews();
                        };
                        reader.readAsDataURL(file);
                    }
                    fileInput.value = '';
                });
                function renderImagePreviews() {
                    if (previewGrid) {

                                renderImagePreviews();
                            });
                        });
                    }
                }
                submitBtn.addEventListener('click', async () => {
                    if (selectedImageFiles.length === 0) { showNotificationMessage("Select at least one image", "error"); return; }
                    const description = descriptionInput.value.trim();
                    submitBtn.disabled = true;
                    try {
                        const uploadedUrls = [];
                        for (const file of selectedImageFiles) {
                            const url = await uploadToImgBB(file);
                            uploadedUrls.push(url);
                        }
                        await createPost('', uploadedUrls, description);
                        selectedImageFiles = [];
                        imagePreviewUrls = [];
                        renderPostsTab();
                    } catch (err) {
                        showNotificationMessage("Upload failed: " + err.message, "error");
                    } finally {
                        submitBtn.disabled = false;
                    }
                });
            }
        }
        
        // Attach click listeners to discovery cards and grid items
        document.querySelectorAll('.discovery-card, .grid-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const postId = el.dataset.postid;
                if (postId) window.location.href = `news.html?id=${postId}`;
            });
        });
    }

        if (window.innerWidth > 768) {
            blocker.style.display = 'flex';
            app.style.display = 'none';
        } else {
            blocker.style.display = 'none';
            app.style.display = 'block';
        }
    }
    (function antiScreenshot() { 
        const blackFlash = () => { 
            const o=document.createElement('div'); 
            o.style.position='fixed'; 
            o.style.top=o.style.left='0'; 
            o.style.width=o.style.height='100%'; 
            o.style.backgroundColor='#000'; 
            o.style.zIndex='999999'; 
            document.body.appendChild(o); 
            setTimeout(()=>o.remove(),200); 
        }; 
        document.addEventListener('keyup', (e) => { if(e.key === 'PrintScreen') { blackFlash(); e.preventDefault(); } }); 
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); blackFlash(); }); 
    })();
    window.addEventListener('resize', handleResize); 
    handleResize();
    
    // ---------- Startup ----------
    (async () => {
        await loadCurrentUser();
        loadUsersRealtime();
        setupPostsListener();
        setActiveNav("posts");
    })();
</script>
</body>
