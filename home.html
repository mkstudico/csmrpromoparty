<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galagram • Admin Panel</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA3gohTf1rzOYBBQCI-WD8ORoTK4DOf-fw",
            authDomain: "akademia-c56ff.firebaseapp.com",
            databaseURL: "https://akademia-c56ff-default-rtdb.firebaseio.com",
            projectId: "akademia-c56ff",
            storageBucket: "akademia-c56ff.firebasestorage.app",
            messagingSenderId: "678278775270",
            appId: "1:678278775270:web:ed5aee3d358d613c8cd627",
            measurementId: "G-X3CHCJE5LK"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .pc-blocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .app-container { display: block; max-width: 480px; margin: 0 auto; background: #ffffff; min-height: 100vh; }
        .header { background: #ffffff; padding: 12px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 0.5px solid #efefef; position: sticky; top: 0; z-index: 10; }
        .back-btn { font-size: 1.6rem; cursor: pointer; color: #262626; }
        .logo { font-weight: 620; font-size: 1.3rem; background: linear-gradient(135deg, #f77737, #d62976, #962fbf); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .admin-tabs { display: flex; padding: 0 16px; background: #fff; border-bottom: 0.5px solid #efefef; gap: 20px; }
        .admin-tab { padding: 12px 0; font-size: 0.8rem; font-weight: 600; color: #8e8e8e; cursor: pointer; border-bottom: 2px solid transparent; }
        .admin-tab.active { color: #0095f6; border-bottom-color: #0095f6; }
        .content { padding: 16px; background: #fafafa; min-height: 85vh; }
        .user-item, .post-item { background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
        .user-info, .post-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .user-avatar, .post-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .user-details, .post-details { flex: 1; }
        .user-name, .post-author { font-weight: 600; font-size: 0.9rem; }
        .user-username, .post-time { font-size: 0.7rem; color: #8e8e8e; }
        .post-text { font-size: 0.8rem; margin-top: 4px; color: #262626; }
        .badge-select, .action-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid #dbdbdb; background: white; cursor: pointer; font-size: 0.75rem; margin-left: 8px; }
        .action-btn.pin { background: #f59e0b; color: white; border: none; }
        .action-btn.delete { background: #ef4444; color: white; border: none; }
        .action-btn.edit { background: #0095f6; color: white; border: none; }
        .search-bar { margin-bottom: 16px; }
        .search-input { width: 100%; padding: 10px 14px; border: 1px solid #dbdbdb; border-radius: 10px; font-size: 0.85rem; }
        .galagram-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); color: white; padding: 12px 20px; border-radius: 40px; z-index: 10000; transition: transform 0.25s; }
        .galagram-toast.show { transform: translateX(-50%) translateY(0); }
        .loading { text-align: center; padding: 40px; color: #8e8e8e; }
        .bx-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="pcBlocker" class="pc-blocker"><i class='bx bx-mobile-alt'></i><p>Use your phone — PC is not supported</p></div>

<div id="appRoot" class="app-container">
    <div class="header">
        <i class='bx bx-arrow-back back-btn' id="backBtn"></i>
        <div class="logo">Admin Panel</div>
    </div>
    
    <div class="admin-tabs">
        <div class="admin-tab active" data-tab="users">👥 Users</div>
        <div class="admin-tab" data-tab="posts">📝 Posts</div>
    </div>
    
    <div class="content">
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Search...">
        </div>
        <div id="adminContent"><div class="loading"><i class='bx bx-loader-alt bx-spin'></i> Loading...</div></div>
    </div>
</div>

<script type="module">
    import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const db = window.db;
    
    let currentTab = "users";
    let allUsers = [];
    let allPosts = [];
    let searchQuery = "";
    
    function showNotification(message) {
        const toast = document.createElement('div');
        toast.className = 'galagram-toast';
        toast.innerHTML = `<i class='bx bx-check-circle'></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => toast.remove(), 2000);
    }
    
    const sessionData = localStorage.getItem('galagram_session');
    if (!sessionData) { window.location.href = "index.html"; }
    
    async function loadUsers() {
        const usersRef = collection(db, "users");
        const snapshot = await getDocs(usersRef);
        allUsers = [];
        snapshot.forEach(docSnap => {
            allUsers.push({ id: docSnap.id, ...docSnap.data() });
        });
        renderUsers();
    }
    
    async function loadPosts() {
        const postsRef = collection(db, "news");
        const q = query(postsRef, orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        allPosts = [];
        snapshot.forEach(docSnap => {
            allPosts.push({ id: docSnap.id, ...docSnap.data() });
        });
        renderPosts();
    }
    
    function renderUsers() {
        let filtered = allUsers;
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            filtered = allUsers.filter(u => 
                u.realName?.toLowerCase().includes(q) || 
                u.username?.toLowerCase().includes(q)
            );
        }
        const container = document.getElementById('adminContent');
        if (!filtered.length) {
            container.innerHTML = `<div class="loading">No users found</div>`;
            return;
        }
        
        let html = '';
        filtered.forEach(user => {
            const currentBadge = user.verified || "none";
            html += `
                <div class="user-item">
                    <div class="user-info">
                        <img class="user-avatar" src="${user.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt="">
                        <div class="user-details">
                            <div class="user-name">${escapeHtml(user.realName)}</div>
                            <div class="user-username">@${user.username}</div>
                        </div>
                    </div>
                    <select class="badge-select" data-id="${user.id}">
                        <option value="none" ${currentBadge === 'none' ? 'selected' : ''}>No badge</option>
                        <option value="gray" ${currentBadge === 'gray' ? 'selected' : ''}>Gray ✓</option>
                        <option value="blue" ${currentBadge === 'blue' ? 'selected' : ''}>Blue ✓✓</option>
                    </select>
                </div>
            `;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.badge-select').forEach(select => {
            select.addEventListener('change', async (e) => {
                const userId = select.dataset.id;
                const newBadge = select.value;
                await updateDoc(doc(db, "users", userId), { verified: newBadge });
                showNotification(`Badge updated`);
            });
        });
    }
    
    function renderPosts() {
        let filtered = allPosts;
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            filtered = allPosts.filter(p => 
                p.text?.toLowerCase().includes(q) || 
                p.authorName?.toLowerCase().includes(q)
            );
        }
        const container = document.getElementById('adminContent');
        if (!filtered.length) {
            container.innerHTML = `<div class="loading">No posts found</div>`;
            return;
        }
        
        let html = '';
        filtered.forEach(post => {
            const isPinned = post.pinned || false;
            html += `
                <div class="post-item">
                    <div class="post-info">
                        <img class="post-avatar" src="${post.authorAvatar || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt="">
                        <div class="post-details">
                            <div class="post-author">${escapeHtml(post.authorName)}</div>
                            <div class="post-time">${formatTime(post.createdAt)}</div>
                            <div class="post-text">${escapeHtml(post.text.substring(0, 80))}${post.text.length > 80 ? '...' : ''}</div>
                        </div>
                    </div>
                    <div>
                        <button class="action-btn pin" data-id="${post.id}" data-pinned="${isPinned}">${isPinned ? '📌 Unpin' : '📍 Pin'}</button>
                        <button class="action-btn edit" data-id="${post.id}">✏️ Edit</button>
                        <button class="action-btn delete" data-id="${post.id}">🗑️ Delete</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        
        // Pin button handler
        document.querySelectorAll('.action-btn.pin').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const postId = btn.dataset.id;
                const currentlyPinned = btn.dataset.pinned === 'true';
                await updateDoc(doc(db, "news", postId), { pinned: !currentlyPinned });
                showNotification(currentlyPinned ? 'Post unpinned' : 'Post pinned');
                loadPosts();
            });
        });
        
        // Edit button handler
        document.querySelectorAll('.action-btn.edit').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const postId = btn.dataset.id;
                const post = allPosts.find(p => p.id === postId);
                const newText = prompt("Edit post content:", post.text);
                if (newText && newText.trim()) {
                    await updateDoc(doc(db, "news", postId), { text: newText.trim() });
                    showNotification('Post updated');
                    loadPosts();
                }
            });
        });
        
        // Delete button handler
        document.querySelectorAll('.action-btn.delete').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if (confirm('Delete this post permanently?')) {
                    const postId = btn.dataset.id;
                    await deleteDoc(doc(db, "news", postId));
                    showNotification('Post deleted');
                    loadPosts();
                }
            });
        });
    }
    
    function formatTime(timestamp) {
        if (!timestamp) return 'unknown';
        const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
        return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('backBtn').addEventListener('click', () => { window.location.href = "home.html"; });
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        if (currentTab === 'users') renderUsers();
        else renderPosts();
    });
    
    document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTab = tab.dataset.tab;
            document.getElementById('searchInput').value = '';
            searchQuery = '';
            if (currentTab === 'users') {
                loadUsers();
            } else {
                loadPosts();
            }
        });
    });
    
    (function antiScreenshot() {
        const blackFlash = () => {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = overlay.style.left = '0';
            overlay.style.width = overlay.style.height = '100%';
            overlay.style.backgroundColor = '#000000';
            overlay.style.zIndex = '999999';
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 200);
        };
        document.addEventListener('keyup', (e) => { if(e.key === 'PrintScreen') { blackFlash(); e.preventDefault(); } });
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); blackFlash(); });
    })();
    
    function handleResize() {
        const blocker = document.getElementById('pcBlocker');
        const app = document.getElementById('appRoot');
        if(window.innerWidth > 768) { blocker.style.display = 'flex'; if(app) app.style.display = 'none'; }
        else { blocker.style.display = 'none'; if(app) app.style.display = 'block'; }
    }
    window.addEventListener('resize', handleResize);
    handleResize();
    
    loadUsers();
</script>
</body>
</html>
