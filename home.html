    <style>

        body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

<script type="module">
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, onSnapshot, arrayUnion, arrayRemove, orderBy, addDoc, serverTimestamp, limit, writeBatch } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const db = window.db;
    
    let currentUser = null;
    let allUsers = [];
    let postsItems = [];
    let requestsList = [];
    let currentTab = "posts";
    let searchQuery = "";
    let searchDebounceTimer = null;
    let unsubscribeMessages = null;
    let recentSuggestions = [];
    
    async function addLog(type, actor, target, message) {
        try { await addDoc(collection(db, "logs"), { type, actor, target, message, timestamp: new Date() }); } catch(e) { console.warn("Log error:", e); }
    }
    
    function showNotification(message, type = "info") {
        const existing = document.querySelector('.galagram-toast');
        if(existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = `galagram-toast`;
        toast.innerHTML = `<i class='bx ${type === 'error' ? 'bx-error-circle' : 'bx-check-circle'}'></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => toast.remove(), 4000);
    }
    
    const sessionData = localStorage.getItem('galagram_session');
    if (!sessionData) { window.location.href = "index.html"; }
    const session = JSON.parse(sessionData);
    const currentUsername = session.username;
    const sessionId = session.sessionId;
    
    import { doc as fDoc, onSnapshot as fOnSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    const userRef = fDoc(db, "users", currentUsername);
    const unsubscribeSession = fOnSnapshot(userRef, (docSnap) => {
        if (docSnap.exists() && docSnap.data().activeSession !== sessionId) {
            showNotification('⚠️ Session expired. Logging out...', 'error');
            setTimeout(() => { localStorage.removeItem('galagram_session'); window.location.href = "index.html"; }, 2000);
        }
    });
    
    async function loadCurrentUser() {
        const userDoc = await getDoc(fDoc(db, "users", currentUsername));
        if (userDoc.exists()) {
            currentUser = { id: currentUsername, ...userDoc.data() };
            if (!currentUser.galaStatus) await updateDoc(fDoc(db, "users", currentUsername), { galaStatus: "available", requests: [], sentRequests: [] });
            if (!currentUser.requests) await updateDoc(fDoc(db, "users", currentUsername), { requests: [] });
            if (!currentUser.sentRequests) await updateDoc(fDoc(db, "users", currentUsername), { sentRequests: [] });
            if (!currentUser.verified) await updateDoc(fDoc(db, "users", currentUsername), { verified: "none" });
            requestsList = currentUser.requests || [];
            updateRequestBadge();
            document.getElementById('profileAvatar').src = currentUser.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80';
            if (!currentUser.survey) showSurvey();
        }
    }
    
    // ---------- SURVEY ----------
    function showSurvey() {
        const districts = ["Gasabo","Kicukiro","Nyarugenge","Gisagara","Huye","Kamonyi","Muhanga","Nyamagabe","Nyanza","Nyaruguru","Ruhango","Karongi","Ngororero","Nyabihu","Nyamasheke","Rubavu","Rusizi","Rutsiro","Bugesera","Gatsibo","Kayonza","Kirehe","Ngoma","Nyagatare","Rwamagana","Burera","Gakenke","Gicumbi","Musanze","Rulindo"];
        const ages = ["16-18","19-21"];
        const heights = ["Short","Medium","Tall","Taller"];
        const hobbies = ["Physical fitness","Entertainment","Betting","Eating","Travel","Dancing"];
        const classes = ["S6 MCE","S6 MCB","S6 MEG","S6 PCB","S6 PCM","S6 LFK"];
        const kissed = ["YES","NO"];
        
        let answers = { district: "", ageRange: "", height: "", hobby: "", classCombo: "", everKissed: "" };
        let step = 0;
        const questions = [
            { label: "Home District", type: "select", options: districts, field: "district" },
            { label: "Age & Height", type: "group", fields: ["ageRange","height"], sublabels: ["Age","Height"], options: [ages, heights] },
            { label: "Hobby", type: "select", options: hobbies, field: "hobby" },
            { label: "Class Combination", type: "select", options: classes, field: "classCombo" },
            { label: "Ever Kissed?", type: "select", options: kissed, field: "everKissed" }
        ];
        
        const overlay = document.createElement('div');
        overlay.className = 'survey-overlay';
        const container = document.createElement('div');
        container.className = 'survey-container';
        overlay.appendChild(container);
        document.body.appendChild(overlay);
        
        function renderStep() {
            const q = questions[step];
            let innerHtml = `<div class="survey-title">✨ Tell us about yourself ✨</div>`;
            innerHtml += `<div class="survey-progress"><div class="survey-progress-bar" style="width: ${((step+1)/questions.length)*100}%"></div></div>`;
            innerHtml += `<div class="survey-question"><div class="survey-label">${q.label}</div>`;
            if (q.type === "select") {
                innerHtml += `<select id="survey-${q.field}" class="survey-select">`;
                q.options.forEach(opt => { innerHtml += `<option value="${opt}">${opt}</option>`; });
                innerHtml += `</select>`;
            } else if (q.type === "group") {
                innerHtml += `<div class="survey-subquestion">`;
                q.fields.forEach((field, idx) => {
                    innerHtml += `<select id="survey-${field}" class="survey-select" style="flex:1"><option value="">${q.sublabels[idx]}</option>`;
                    q.options[idx].forEach(opt => { innerHtml += `<option value="${opt}">${opt}</option>`; });
                    innerHtml += `</select>`;
                });
                innerHtml += `</div>`;
            }
            innerHtml += `</div><div class="survey-buttons">`;
            if (step > 0) innerHtml += `<button class="survey-btn survey-btn-secondary" id="surveyPrev">Back</button>`;
            innerHtml += `<button class="survey-btn survey-btn-primary" id="surveyNext">${step === questions.length-1 ? "Finish" : "Next"}</button>`;
            innerHtml += `</div>`;
            container.innerHTML = innerHtml;
            
            if (q.type === "select") {
                const sel = container.querySelector(`#survey-${q.field}`);
                if (answers[q.field]) sel.value = answers[q.field];
            } else if (q.type === "group") {
                q.fields.forEach(field => {
                    const sel = container.querySelector(`#survey-${field}`);
                    if (answers[field]) sel.value = answers[field];
                });
            }
            
            const nextBtn = container.querySelector('#surveyNext');
            const prevBtn = container.querySelector('#surveyPrev');
            if (nextBtn) nextBtn.addEventListener('click', () => {
                if (q.type === "select") {
                    const val = container.querySelector(`#survey-${q.field}`).value;
                    if (!val) { showNotification("Please select an option", "error"); return; }
                    answers[q.field] = val;
                } else if (q.type === "group") {
                    let allFilled = true;
                    q.fields.forEach(field => {
                        const val = container.querySelector(`#survey-${field}`).value;
                        if (!val) allFilled = false;
                        answers[field] = val;
                    });
                    if (!allFilled) { showNotification("Please fill both age and height", "error"); return; }
                }
                if (step === questions.length-1) {
                    finishSurvey();
                } else {
                    step++;
                    renderStep();
                }
            });
            if (prevBtn) prevBtn.addEventListener('click', () => { step--; renderStep(); });
        }
        
        async function finishSurvey() {
            await updateDoc(doc(db, "users", currentUsername), {
                survey: {
                    district: answers.district,
                    ageRange: answers.ageRange,
                    height: answers.height,
                    hobby: answers.hobby,
                    classCombo: answers.classCombo,
                    everKissed: answers.everKissed,
                    completedAt: new Date()
                }
            });
            currentUser.survey = { ...answers };
            showNotification("Survey completed! Your matches will improve.", "success");
            overlay.remove();
            setTimeout(() => showSuggestionPopupIfNeeded(), 1000);
        }
        
        renderStep();
    }
    
    // ---------- DYNAMIC COMPATIBILITY ALGORITHM (only for opposite gender) ----------
    function computeCompatibilityScore(user) {
        if (user.id === currentUsername) return -Infinity;
        if (user.galaStatus !== "available") return -Infinity;
        if (currentUser.sentRequests?.includes(user.id)) return -Infinity;
        if (currentUser.requests?.includes(user.id)) return -Infinity;
        
        let score = 50;
        
        // Opposite gender gets high base score
        if (currentUser.gender !== user.gender) score += 30;
        else return -Infinity; // Same gender users are never shown in AVAILABLE or suggestions, but ALL tab will show them unsorted
        
        // Survey-based scoring
        const mySurvey = currentUser.survey;
        const theirSurvey = user.survey;
        if (mySurvey && theirSurvey) {
            if (mySurvey.district === theirSurvey.district) score += 25;
            if (mySurvey.ageRange === theirSurvey.ageRange) score += 15;
            if (mySurvey.height === theirSurvey.height) score += 10;
            if (mySurvey.hobby === theirSurvey.hobby) score += 30;
            if (mySurvey.classCombo === theirSurvey.classCombo) score += 35;
            if (mySurvey.everKissed === theirSurvey.everKissed) score += 10;
        }
        
        score += Math.min(user.rejectionCount || 0, 8) * 3;
        if (user.createdAt) {
            const daysSinceJoin = (Date.now() - new Date(user.createdAt).getTime()) / (1000*3600*24);
            if (daysSinceJoin < 3) score += 20;
        }
        score += Math.min(user.chatMessageCount || 0, 100) * 0.3;
        if (recentSuggestions.includes(user.id)) score -= 40;
        if (user.verified === "blue") score += 25;
        else if (user.verified === "gray") score += 15;
        
        return score;
    }
    
    function getTopSuggestions(users, count = 5) {
        return users.filter(u => u.galaStatus === "available" && u.id !== currentUsername && currentUser.gender !== u.gender)
                    .map(u => ({ user: u, score: computeCompatibilityScore(u) }))
                    .sort((a,b) => b.score - a.score)
                    .slice(0, count)
                    .map(item => item.user);
    }
    
    function addToRecentSuggestions(userId) {
        recentSuggestions.unshift(userId);
        if (recentSuggestions.length > 10) recentSuggestions.pop();
    }
    
    async function showSuggestionPopupIfNeeded() {
        if (!currentUser || currentUser.galaStatus !== "available") return;
        const today = new Date().toDateString();
        if (localStorage.getItem('galagram_suggestion_date') === today) return;
        const suggestions = getTopSuggestions(allUsers, 3);
        if (suggestions.length === 0) return;
        const topMatch = suggestions[0];
        addToRecentSuggestions(topMatch.id);
        
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);';
        const popup = document.createElement('div');
        popup.style.cssText = 'background:white;border-radius:24px;width:85%;max-width:320px;padding:24px 20px;text-align:center;';
        const pronoun = topMatch.gender === 'BOY' ? 'him' : 'her';
        popup.innerHTML = `
            <div style="font-size:1.3rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#f77737,#d62976);-webkit-background-clip:text;background-clip:text;color:transparent;">✨ Perfect Match ✨</div>
            <div style="display:flex;align-items:center;gap:12px;background:#f8f8f8;padding:12px;border-radius:16px;margin:16px 0;">
                <img src="${topMatch.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">
                <div><div style="font-weight:600;font-size:1rem;">${escapeHtml(topMatch.realName)}</div><div style="font-size:0.7rem;color:#8e8e8e;">@${topMatch.username}</div></div>
            </div>
            <p>Are you interested in ${escapeHtml(topMatch.realName)}? Request ${pronoun} to be your gala!</p>
            <div style="display:flex;gap:12px;margin-top:16px;">
                <button id="suggAccept" style="flex:1;padding:10px;border-radius:30px;font-weight:600;background:#0095f6;color:white;border:none;">Request</button>
                <button id="suggDecline" style="flex:1;padding:10px;border-radius:30px;font-weight:600;background:#efefef;color:#262626;border:none;">No, Thanks</button>
            </div>
        `;
        overlay.appendChild(popup);
        document.body.appendChild(overlay);
        popup.querySelector('#suggAccept').addEventListener('click', async () => {
            try {
                await updateDoc(doc(db, "users", topMatch.id), { requests: arrayUnion(currentUsername) });
                await updateDoc(doc(db, "users", currentUsername), { sentRequests: arrayUnion(topMatch.id) });
                showNotification(`Request sent to ${topMatch.realName}!`, 'success');
                await addLog('request', currentUsername, topMatch.id, `${currentUsername} requested ${topMatch.realName} (via suggestion popup)`);
            } catch(e) { showNotification("Error sending request", "error"); }
            overlay.remove();
            localStorage.setItem('galagram_suggestion_date', today);
        });
        popup.querySelector('#suggDecline').addEventListener('click', () => { overlay.remove(); localStorage.setItem('galagram_suggestion_date', today); });
    }
    
    // ---------- POSTS RANKING ----------
    function calculatePostScore(post) {
        const likes = post.likes?.length || 0, comments = post.comments?.length || 0;
        const engagementScore = likes * 1.5 + comments * 1.0;
        const createdAt = post.createdAt?.toDate ? post.createdAt.toDate() : new Date(post.createdAt);
        const hoursSince = (new Date() - createdAt) / (1000 * 60 * 60);
        let decayFactor = hoursSince > 48 ? Math.max(0.3, 1.0 - (hoursSince - 48) / 168) : 1.0 - (hoursSince / 96);
        return (engagementScore * decayFactor) + (post.pinned ? 1000 : 0);
    }
    
    function loadPosts() {
        const q = query(collection(db, "news"));
        onSnapshot(q, (snapshot) => {
            postsItems = []; snapshot.forEach(docSnap => postsItems.push({ id: docSnap.id, ...docSnap.data() }));
            postsItems.sort((a,b) => calculatePostScore(b) - calculatePostScore(a));
            if (currentTab === "posts") renderPosts();
        });
    }
    
    let unsubscribeUsers = null;
    function loadUsers() {
        if (unsubscribeUsers) unsubscribeUsers();
        unsubscribeUsers = onSnapshot(collection(db, "users"), (snapshot) => {
            allUsers = [];
            snapshot.forEach(docSnap => { if (docSnap.id !== currentUsername) allUsers.push({ id: docSnap.id, ...docSnap.data(), galaStatus: docSnap.data().galaStatus || "available", verified: docSnap.data().verified || "none" }); });
            if (currentTab !== "posts" && currentTab !== "chat") renderUsers();
        });
    }
    
    function getVerifiedIcon(verified) {
        if (verified === "blue") return '<i class="bx bx-check-circle verified-badge blue"></i>';
        if (verified === "gray") return '<i class="bx bxs-check-circle verified-badge gray"></i>';
        return '';
    }
    
    function renderPosts() {
        const container = document.getElementById('contentArea');
        if (!postsItems.length) { container.innerHTML = `<div class="empty-state"><i class='bx bx-news' style="font-size: 3rem;"></i><p>No posts yet. Tap + to create one!</p></div>`; return; }
        container.innerHTML = postsItems.map(post => `
            <div class="post-card" data-postid="${post.id}">
                <div class="post-header"><img class="post-avatar" src="${post.authorAvatar || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt=""><div><div class="post-author-row"><span class="post-author">${escapeHtml(post.authorName)}</span>${getVerifiedIcon(post.authorVerified)}</div><div class="post-time">${formatTime(post.createdAt)}</div></div></div>
                <div class="post-text">${escapeHtml(post.text)}</div>${post.imageUrl ? `<img class="post-image" src="${post.imageUrl}" alt="post image">` : ''}
                <div class="post-stats"><span><i class='bx bx-heart'></i> ${post.likes?.length || 0}</span><span><i class='bx bx-comment'></i> ${post.comments?.length || 0}</span></div>
            </div>
        `).join('');
        document.querySelectorAll('.post-card').forEach(card => card.addEventListener('click', () => window.location.href = `news.html?id=${card.dataset.postid}`));
    }
    
    function renderUsers() {
        let filtered = [...allUsers];
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            filtered = filtered.filter(u => u.username?.toLowerCase().includes(q) || u.realName?.toLowerCase().includes(q));
        }
        
        if (currentTab === "available") {
            // AVAILABLE: only opposite gender, available, sorted by compatibility
            filtered = filtered.filter(u => u.galaStatus === "available" && u.gender !== currentUser.gender);
            filtered = getTopSuggestions(filtered, filtered.length);
        } 
        else if (currentTab === "taken") {
            // TAKEN: show all taken users (both genders), no sorting
            filtered = filtered.filter(u => u.galaStatus === "taken");
        } 
        else if (currentTab === "all") {
            // ALL: show everyone (including same gender) but sorted by compatibility for opposite gender only?
            // Keep original order (no sorting for same gender, but show them)
            // We'll separate: opposite gender sorted, then same gender unsorted at bottom
            const opposite = filtered.filter(u => u.galaStatus === "available" && u.gender !== currentUser.gender);
            const same = filtered.filter(u => u.galaStatus === "available" && u.gender === currentUser.gender);
            const taken = filtered.filter(u => u.galaStatus === "taken");
            const sortedOpposite = getTopSuggestions(opposite, opposite.length);
            filtered = [...sortedOpposite, ...same, ...taken];
        }
        
        const container = document.getElementById('contentArea');
        if (!filtered.length) {
            container.innerHTML = `<div class="empty-state"><i class='bx bx-user-x' style="font-size: 3rem;"></i><p>No users found</p></div>`;
            return;
        }
        container.innerHTML = filtered.map(user => `
            <div class="user-card" data-userid="${user.id}">
                <div class="post-header"><div class="avatar-container"><img class="user-avatar" src="${user.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=80'}" alt=""><div class="status-stroke ${user.galaStatus === 'available' ? 'available' : 'taken'}"></div></div>
                <div><div class="user-name-row"><span class="user-name">@${escapeHtml(user.username)}</span>${getVerifiedIcon(user.verified)}</div><div class="user-username">${escapeHtml(user.realName)}</div></div></div>
            </div>
        `).join('');
        document.querySelectorAll('.user-card').forEach(card => card.addEventListener('click', () => window.location.href = `user.html?uid=${encodeURIComponent(card.dataset.userid)}`));
    }
    
    // ---------- SEARCH SUGGESTIONS (only opposite gender, available) ----------
    const searchInput = document.getElementById('searchInput');
    const suggestionsDiv = document.getElementById('searchSuggestions');
    function performSearch() {
        searchQuery = searchInput.value.trim();
        if (currentTab !== "posts" && currentTab !== "chat") renderUsers();
        suggestionsDiv.classList.remove('show');
    }
    function updateSearchSuggestions() {
        const queryText = searchInput.value.trim().toLowerCase();
        if (!queryText) { suggestionsDiv.classList.remove('show'); return; }
        let matches = allUsers.filter(u => 
            (u.username?.toLowerCase().includes(queryText) || u.realName?.toLowerCase().includes(queryText)) &&
            u.gender !== currentUser.gender &&
            u.galaStatus === "available" &&
            !currentUser.sentRequests?.includes(u.id) &&
            !currentUser.requests?.includes(u.id)
        ).slice(0, 5);
        
        if (!matches.length) { suggestionsDiv.classList.remove('show'); return; }
        suggestionsDiv.innerHTML = matches.map(user => `
            <div class="search-suggestion-item" data-username="${user.username}" data-userid="${user.id}">
                <img class="suggestion-avatar" src="${user.profileImage || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=36'}" alt="">
                <div><div style="font-weight:500;">${escapeHtml(user.realName)}</div><div style="font-size:0.7rem; color:#8e8e8e;">@${user.username}</div></div>
            </div>
        `).join('');
        suggestionsDiv.classList.add('show');
        document.querySelectorAll('.search-suggestion-item').forEach(item => {
            item.addEventListener('click', () => {
                const userId = item.dataset.userid;
                window.location.href = `user.html?uid=${userId}`;
            });
        });
    }
    searchInput.addEventListener('input', () => {
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => { performSearch(); updateSearchSuggestions(); }, 300);
    });
    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !suggestionsDiv.contains(e.target)) suggestionsDiv.classList.remove('show');
    });
    
    function updateRequestBadge() { const badge = document.getElementById('requestBadge'); const count = requestsList.length; if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.remove('hidden'); } else badge.classList.add('hidden'); }
    function formatTime(timestamp) { if (!timestamp) return 'just now'; const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp); const diff = Math.floor((new Date() - date) / 1000); if (diff < 60) return `${diff}s ago`; if (diff < 3600) return `${Math.floor(diff / 60)}m ago`; if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`; return `${Math.floor(diff / 86400)}d ago`; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    function listenToCurrentUser() { onSnapshot(fDoc(db, "users", currentUsername), (docSnap) => { if (docSnap.exists()) { currentUser = { id: currentUsername, ...docSnap.data() }; requestsList = currentUser.requests || []; updateRequestBadge(); if (currentTab !== "posts" && currentTab !== "chat") renderUsers(); } }); }
    
    // ---------- CHAT ----------
    let chatOpen = false;
    const chatOverlay = document.getElementById('chatOverlay'), chatMessagesDiv = document.getElementById('chatMessages'), chatInput = document.getElementById('chatInput'), sendBtn = document.getElementById('sendChatBtn'), closeChat = document.getElementById('closeChat'), emojiBtn = document.getElementById('emojiBtn'), emojiPicker = document.getElementById('emojiPicker');
    function loadChatMessages() { if (unsubscribeMessages) unsubscribeMessages(); const q = query(collection(db, "chatMessages"), orderBy("timestamp", "asc"), limit(100)); unsubscribeMessages = onSnapshot(q, (snapshot) => { chatMessagesDiv.innerHTML = ''; snapshot.forEach(docSnap => { const msg = docSnap.data(); const isOwn = msg.username === currentUsername; const verifiedIcon = msg.userVerified === 'blue' ? '<i class="bx bx-check-circle" style="color:#0095f6; font-size:0.7rem;"></i>' : (msg.userVerified === 'gray' ? '<i class="bx bxs-check-circle" style="color:#8e8e8e; font-size:0.7rem;"></i>' : ''); chatMessagesDiv.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><img class="message-avatar" src="${msg.userAvatar || 'https://ui-avatars.com/api/?background=962fbf&color=fff&rounded=true&size=36'}" alt=""><div class="message-bubble"><div class="message-name">@${escapeHtml(msg.username)} ${verifiedIcon}</div><div>${escapeHtml(msg.text)}</div></div></div>`; }); chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight; }); }
    async function sendChatMessage() { const text = chatInput.value.trim(); if (!text) return; try { await addDoc(collection(db, "chatMessages"), { username: currentUsername, text: text, userAvatar: currentUser.profileImage, userVerified: currentUser.verified || "none", timestamp: serverTimestamp() }); const newCount = (currentUser.chatMessageCount || 0) + 1; await updateDoc(doc(db, "users", currentUsername), { chatMessageCount: newCount }); currentUser.chatMessageCount = newCount; chatInput.value = ''; } catch(e) { showNotification("Failed to send", "error"); } }
    function openChat() { chatOverlay.classList.add('open'); chatOpen = true; loadChatMessages(); }
    closeChat.addEventListener('click', () => { chatOverlay.classList.remove('open'); if (unsubscribeMessages) unsubscribeMessages(); currentTab = "posts"; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelector('.tab[data-tab="posts"]').classList.add('active'); renderPosts(); document.getElementById('fabBtn').classList.remove('hidden'); });
    sendBtn.addEventListener('click', sendChatMessage); chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
    emojiBtn.addEventListener('click', () => { emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'block' : 'none'; });
    emojiPicker.addEventListener('emoji-click', (event) => { chatInput.value += event.detail.unicode; emojiPicker.style.display = 'none'; });
    document.addEventListener('click', (e) => { if (!emojiBtn.contains(e.target) && !emojiPicker.contains(e.target)) emojiPicker.style.display = 'none'; });
    
    // ---------- TAB SWITCHING ----------
    document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', () => { const tabName = tab.dataset.tab; if (tabName === 'chat') { openChat(); return; } document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); currentTab = tabName; const fab = document.getElementById('fabBtn'); if (currentTab === 'posts') fab.classList.remove('hidden'); else fab.classList.add('hidden'); if (currentTab === "posts") renderPosts(); else renderUsers(); }); });
    document.getElementById('requestsHeart').addEventListener('click', () => window.location.href = `requests.html`);
    document.getElementById('profileAvatar').addEventListener('click', () => window.location.href = `profile.html`);
    document.getElementById('fabBtn').addEventListener('click', () => window.location.href = `add-news.html`);
    
    // ---------- SCREENSHOT PROTECTION ----------
    (function antiScreenshot() { const blackFlash = () => { const o=document.createElement('div'); o.style.position='fixed'; o.style.top=o.style.left='0'; o.style.width=o.style.height='100%'; o.style.backgroundColor='#000'; o.style.zIndex='999999'; document.body.appendChild(o); setTimeout(()=>o.remove(),200); }; document.addEventListener('keyup', (e) => { if(e.key === 'PrintScreen') { blackFlash(); e.preventDefault(); } }); document.addEventListener('contextmenu', (e) => { e.preventDefault(); blackFlash(); }); })();
    
    function handleResize() { const blocker = document.getElementById('pcBlocker'); const app = document.getElementById('appRoot'); if(window.innerWidth > 768) { blocker.style.display = 'flex'; if(app) app.style.display = 'none'; } else { blocker.style.display = 'none'; if(app) app.style.display = 'block'; } }
    window.addEventListener('resize', handleResize); handleResize();
    
    (async () => { await loadCurrentUser(); loadPosts(); loadUsers(); listenToCurrentUser(); if (currentTab === 'posts') document.getElementById('fabBtn').classList.remove('hidden'); })();
</script>
</body>
